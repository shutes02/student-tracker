      <input placeholder="New sub-type" id="subparamTplSubtypeIn-${t.id}"><button class="btn-primary btn-tiny" data-subparam-tpl-add-subtype="${t.id}">+ Add sub-type</button>
      <input placeholder="New step (direct)" id="subparamTplDirectStepIn-${t.id}"><button class="btn-primary btn-tiny" data-subparam-tpl-add-step="${t.id}|">+ Add step</button>
    </div>`;
}

function renderSubTypeTplEditor(t){
  const inner = (t.steps||[]).map(st=>`<div class="step-row"><div class="step-label editable" data-edit="tplSubtypeStep|${t.id}|${st.id}" title="Double-click to rename">${escapeHTML(st.label)}</div><button class="btn-ghost btn-tiny" data-subtype-tpl-remove-step="${t.id}|${st.id}">Remove</button></div>`).join('');
  return `${inner}
    <div class="tpl-editor-add-row"><input placeholder="New step" id="subtypeTplStepIn-${t.id}"><button class="btn-primary btn-tiny" data-subtype-tpl-add-step="${t.id}">+ Add step</button></div>`;
}

function renderTemplateEditorOverlay(){
  const mode = state.templateEditMode;
  if(!mode) return '';
  const t = findTpl(mode.type, mode.tid);
  if(!t){ state.templateEditMode = null; return ''; }
  const typeLabel = { exercise: 'Exercise Template', param: 'Parameter Template', subparam: 'Sub-parameter Template', subtype: 'Sub-type Template' }[mode.type];
  const bodyFn = { exercise: renderExTplEditor, param: renderParamTplEditor, subparam: renderSubParamTplEditor, subtype: renderSubTypeTplEditor }[mode.type];
  return `
    <div class="tpl-editor-overlay" id="tplEditorOverlay">
      <div class="tpl-editor-modal">
        <div class="tpl-editor-header">
          <div>
            <div class="tpl-editor-title">${escapeHTML(t.title || t.name)}</div>
            <div class="hint">${typeLabel} — add, rename, or remove anything below. Changes save immediately.</div>
          </div>
          <button class="btn-ghost btn-tiny" id="closeTplEditorBtn">Close</button>
        </div>
        ${bodyFn(t)}
      </div>
    </div>`;
}

function groupTemplatesBySource(items, labelFn){
  const groups = [];
  items.forEach(t=>{
    const label = labelFn(t);
    let g = groups.find(x=>x.label===label);
    if(!g){ g = { label, items: [] }; groups.push(g); }
    g.items.push(t);
  });
  return groups;
}
function renderGroupedTemplateRows(items, labelFn, rowFn){
  const groups = groupTemplatesBySource(items, labelFn);
  return groups.map(g=>`<div class="tpl-source-header">${escapeHTML(g.label)}</div>${g.items.map(rowFn).join('')}`).join('');
}

function assignTemplateSource(collectionName, templateId, exerciseName){
  if(!exerciseName) return;
  const t = state[collectionName].find(x=>x.id===templateId);
  if(!t) return;
  t.sourceExercise = exerciseName;
  if(collectionName==='paramTemplates') saveParamTemplates();
  else if(collectionName==='subParamTemplates') saveSubParamTemplates();
  else if(collectionName==='subTypeTemplates') saveSubTypeTemplates();
  render();
}
function bulkAssignOrphanedTemplateSource(exerciseName){
  if(!exerciseName) return;
  let touchedParam = false, touchedSubParam = false, touchedSubType = false;
  state.paramTemplates.forEach(t=>{ if(!t.sourceExercise){ t.sourceExercise = exerciseName; touchedParam = true; } });
  state.subParamTemplates.forEach(t=>{ if(!t.sourceExercise){ t.sourceExercise = exerciseName; touchedSubParam = true; } });
  state.subTypeTemplates.forEach(t=>{ if(!t.sourceExercise){ t.sourceExercise = exerciseName; touchedSubType = true; } });
  if(touchedParam) saveParamTemplates();
  if(touchedSubParam) saveSubParamTemplates();
  if(touchedSubType) saveSubTypeTemplates();
  render();
}

function templateRowHTML(t, editKey, meta, actionsHtml, treeFn, displayTitle, typeTag){
  const isRowExpanded = state.collapsedTemplateRows.has(t.id);
  const title = displayTitle !== undefined ? displayTitle : t.name;
  const tagHtml = typeTag ? `<span class="tpltree-tag ${typeTag.cls}" style="margin-right:6px;">${typeTag.label}</span>` : '';
  return `
    <div class="tplrow-wrap">
      <div class="list-row">
        <div style="display:flex;align-items:flex-start;gap:6px;flex:1;min-width:0;">
          <button class="tplrow-toggle" style="flex-shrink:0;" data-toggle-tplrow="${t.id}">${isRowExpanded?'▾':'▸'}</button>
          <div style="flex:1;min-width:140px;">
            <div class="list-row-name editable" data-edit="${editKey}" title="Double-click to rename">${tagHtml}${escapeHTML(title)}</div>
            <div class="list-row-meta">${meta}</div>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0;">${actionsHtml}</div>
      </div>
      ${isRowExpanded ? `<div class="tpltree">${treeFn(t)}</div>` : ''}
    </div>`;
}

function render(){
  const root = document.getElementById('root');
  if(!state.loaded){ root.innerHTML = `<div style="padding:40px;color:var(--string);">Loading…</div>`; return; }

  const searchTerm = state.studentSearch.trim().toLowerCase();
  const visibleStudents = searchTerm ? state.students.filter(s=> s.name.toLowerCase().includes(searchTerm)) : state.students;
  const chips = visibleStudents.map(s=>`
    <div class="student-chip ${s.id===state.selected?'active':''}" data-select="${s.id}">
      <span class="editable" data-edit="student|${s.id}" title="Double-click to rename">${escapeHTML(s.name)}</span><span class="chip-x" data-remove-student="${s.id}">×</span>
    </div>`).join('') || (searchTerm ? `<div class="hint">No students match "${escapeHTML(state.studentSearch)}".</div>` : '');

  let body = '';
  const student = state.selected ? getStudent(state.selected) : null;

  if(!state.students.length){
    body = `<div class="empty">Add your first student above to get started.</div>`;
  } else if(student){
    if(!student.pieces) student.pieces = [];

    const stepRowHTML = (p, ex, st)=>{
      const key = bucketKey(st);
      const bucket = ex.steps.filter(s2=>bucketKey(s2)===key);
      const idx = bucket.findIndex(s2=>s2.id===st.id);
      const isFirst = idx===0, isLast = idx===bucket.length-1;
      const groupOptions = `<option value="">No parameter</option>` + (ex.groups||[]).map(g=>`<option value="${g.id}" ${st.groupId===g.id?'selected':''}>${escapeHTML(g.name)}</option>`).join('');
      const path = `${student.id}|${p.id}|${ex.id}|${st.id}`;
      const parentGroup = st.groupId ? (ex.groups||[]).find(g=>g.id===st.groupId) : null;
      let subgroupSelectHTML = '';
      if(parentGroup && parentGroup.subgroups && parentGroup.subgroups.length){
        const subOptions = `<option value="">No subparameter</option>` + parentGroup.subgroups.map(sg=>`<option value="${sg.id}" ${st.subGroupId===sg.id?'selected':''}>${escapeHTML(sg.name)}</option>`).join('');
        subgroupSelectHTML = `<select class="group-select" data-set-subgroup="${path}">${subOptions}</select>`;
      }
      const parentSubgroup = (parentGroup && st.subGroupId) ? (parentGroup.subgroups||[]).find(sg=>sg.id===st.subGroupId) : null;
      let subsubgroupSelectHTML = '';
      if(parentSubgroup && parentSubgroup.subsubgroups && parentSubgroup.subsubgroups.length){
        const subSubOptions = `<option value="">No sub-type</option>` + parentSubgroup.subsubgroups.map(ssg=>`<option value="${ssg.id}" ${st.subSubGroupId===ssg.id?'selected':''}>${escapeHTML(ssg.name)}</option>`).join('');
        subsubgroupSelectHTML = `<select class="subsubgroup-select" data-set-subsubgroup="${path}">${subSubOptions}</select>`;
      }
      return `
        <div class="step-row ${st.thisWeek?'in-week':''}">
          <div class="step-order">
            <button class="order-btn" data-move="up" data-path="${path}" ${isFirst?'disabled':''}>▲</button>
            <button class="order-btn" data-move="down" data-path="${path}" ${isLast?'disabled':''}>▼</button>
          </div>
          <div class="step-dot ${st.status}"></div>
          <div class="step-label editable" data-edit="step|${path}" title="Double-click to rename">${escapeHTML(st.label)}</div>
          <select class="group-select" data-set-group="${path}">${groupOptions}</select>
          ${subgroupSelectHTML}
          ${subsubgroupSelectHTML}
          <div class="status-group">
            ${STATUS.map(s=>`<div class="status-btn ${st.status===s?'sel-'+s:''}" data-setstatus="${path}|${s}">${STATUS_LABEL[s]}</div>`).join('')}
          </div>
          ${st.status==='locked_in' ? `<div class="week-toggle" style="opacity:.5;cursor:default;">✅ Locked</div>` : `<div class="week-toggle ${st.thisWeek?'on':''}" data-toggle-week="${path}">${st.thisWeek?'✓ This week':'This week'}</div>`}
          <div class="step-remove" data-remove-step="${path}">×</div>
        </div>
      `;
    };

    const exerciseBlockHTML = (p, ex)=>{
      if(!ex.groups) ex.groups = [];
      const ungrouped = ex.steps.filter(st=>!st.groupId);
      const ungroupedHTML = ungrouped.map(st=>stepRowHTML(p, ex, st)).join('');
      const groupSections = ex.groups.map((g, gIdx)=>{
        if(!g.subgroups) g.subgroups = [];
        const directSteps = ex.steps.filter(st=>st.groupId===g.id && !st.subGroupId);
        const directHTML = directSteps.map(st=>stepRowHTML(p, ex, st)).join('');
        const subSections = g.subgroups.map((sg, sgIdx)=>{
          if(!sg.subsubgroups) sg.subsubgroups = [];
          const directSubSteps = ex.steps.filter(st=>st.groupId===g.id && st.subGroupId===sg.id && !st.subSubGroupId);
          const directSubHTML = directSubSteps.map(st=>stepRowHTML(p, ex, st)).join('');
          const subSubSections = sg.subsubgroups.map((ssg, ssgIdx)=>{
            const steps = ex.steps.filter(st=>st.groupId===g.id && st.subGroupId===sg.id && st.subSubGroupId===ssg.id);
            const isSSCollapsed = state.collapsedSubSubgroups.has(ssg.id);
            const ssSummary = `${steps.length} step${steps.length===1?'':'s'}`;
            const ssPath = `${student.id}|${p.id}|${ex.id}|${g.id}|${sg.id}|${ssg.id}`;
            return `
              <div class="subsubgroup-block">
                <div class="subsubgroup-head">
                  <div class="step-order">
                    <button class="order-btn" data-move-subsubgroup="up|${ssPath}" ${ssgIdx===0?'disabled':''}>▲</button>
                    <button class="order-btn" data-move-subsubgroup="down|${ssPath}" ${ssgIdx===sg.subsubgroups.length-1?'disabled':''}>▼</button>
                  </div>
                  <div class="subsubgroup-head-left" data-toggle-subsubgroup="${ssg.id}">
                    <button class="subsubgroup-collapse-btn">${isSSCollapsed?'▸':'▾'}</button>
                    <span class="subsubgroup-name editable" data-edit="subsubgroup|${ssPath}" title="Double-click to rename">${escapeHTML(ssg.name)}</span>
                    ${isSSCollapsed ? `<div class="subsubgroup-summary">${ssSummary}</div>` : ''}
                  </div>
                  <button class="btn-ghost btn-tiny" data-save-subtype-template="${ssPath}">Save as Template</button>
                  <button class="btn-ghost btn-tiny" data-remove-subsubgroup="${ssPath}">Remove</button>
                </div>
                ${isSSCollapsed ? '' : (steps.map(st=>stepRowHTML(p, ex, st)).join('') || '<div class="hint">No steps yet.</div>')}
              </div>`;
          }).join('');
          const totalStepsInSub = directSubSteps.length + sg.subsubgroups.reduce((n,ssg)=>n+ex.steps.filter(st=>st.groupId===g.id && st.subGroupId===sg.id && st.subSubGroupId===ssg.id).length,0);
          const isSubCollapsed = state.collapsedSubgroups.has(sg.id);
          const subSummary = `${totalStepsInSub} step${totalStepsInSub===1?'':'s'}`;
          const sgPath = `${student.id}|${p.id}|${ex.id}|${g.id}|${sg.id}`;
          return `
            <div class="subgroup-block">
              <div class="subgroup-head">
                <div class="step-order">
                  <button class="order-btn" data-move-subgroup="up|${sgPath}" ${sgIdx===0?'disabled':''}>▲</button>
                  <button class="order-btn" data-move-subgroup="down|${sgPath}" ${sgIdx===g.subgroups.length-1?'disabled':''}>▼</button>
                </div>
                <div class="subgroup-head-left" data-toggle-subgroup="${sg.id}">
                  <button class="subgroup-collapse-btn">${isSubCollapsed?'▸':'▾'}</button>
                  <span class="subgroup-name editable" data-edit="subgroup|${sgPath}" title="Double-click to rename">${escapeHTML(sg.name)}</span>
                  ${isSubCollapsed ? `<div class="subgroup-summary">${subSummary}</div>` : ''}
                </div>
                <button class="btn-ghost btn-tiny" data-save-subparam-template="${sgPath}">Save as Template</button>
                <button class="btn-ghost btn-tiny" data-remove-subgroup="${sgPath}">Remove</button>
              </div>
              ${isSubCollapsed ? '' : `
                ${directSubHTML || (sg.subsubgroups.length ? '' : '<div class="hint">No steps yet.</div>')}
                ${subSubSections}
                <div class="add-subsubgroup-row">
                  <input placeholder="New sub-type, e.g. Shape Only" id="subsubgroupinput-${sg.id}">
                  <button class="btn-primary btn-tiny" data-add-subsubgroup="${sgPath}">+ Add sub-type</button>
                </div>
              `}
            </div>`;
        }).join('');
        const totalStepsInGroup = directSteps.length + g.subgroups.reduce((n,sg)=>n+ex.steps.filter(st=>st.groupId===g.id && st.subGroupId===sg.id).length,0);
        const isGroupCollapsed = state.collapsedGroups.has(g.id);
        const groupSummary = `${totalStepsInGroup} step${totalStepsInGroup===1?'':'s'}`;
        const gPath = `${student.id}|${p.id}|${ex.id}|${g.id}`;
        return `
          <div class="group-block">
            <div class="group-head">
              <div class="step-order">
                <button class="order-btn" data-move-group="up|${gPath}" ${gIdx===0?'disabled':''}>▲</button>
                <button class="order-btn" data-move-group="down|${gPath}" ${gIdx===ex.groups.length-1?'disabled':''}>▼</button>
              </div>
              <div class="group-head-left" data-toggle-group="${g.id}">
                <button class="group-collapse-btn">${isGroupCollapsed?'▸':'▾'}</button>
                <span class="group-name editable" data-edit="group|${gPath}" title="Double-click to rename">${escapeHTML(g.name)}</span>
                ${isGroupCollapsed ? `<div class="group-summary">${groupSummary}</div>` : ''}
              </div>
              <button class="btn-ghost btn-tiny" data-save-param-template="${gPath}">Save as Template</button>
              <button class="btn-ghost btn-tiny" data-remove-group="${gPath}">Remove parameter</button>
            </div>
            ${isGroupCollapsed ? '' : `
              ${directHTML || (g.subgroups.length ? '' : '<div class="hint">No steps in this parameter yet.</div>')}
              ${subSections}
              <div class="add-subgroup-row">
                <input placeholder="New subparameter, e.g. Ascending" id="subgroupinput-${g.id}">
                <button class="btn-ghost btn-tiny" data-add-subgroup="${gPath}">Add subparameter</button>
              </div>
            `}
          </div>`;
      }).join('');

      const isCollapsed = state.collapsedExercises.has(ex.id);
      const stepCount = ex.steps.length;
      const summary = `${(ex.groups||[]).length} param${(ex.groups||[]).length===1?'':'s'} · ${stepCount} step${stepCount===1?'':'s'}`;
      const exPath = `${student.id}|${p.id}|${ex.id}`;
      const exIdx = p.exercises.findIndex(e=>e.id===ex.id);

      return `
        <div class="exercise-block ${isCollapsed?'collapsed':''}">
          <div class="exercise-head">
            <div class="step-order">
              <button class="order-btn" data-move-exercise="up|${exPath}" ${exIdx===0?'disabled':''}>▲</button>
              <button class="order-btn" data-move-exercise="down|${exPath}" ${exIdx===p.exercises.length-1?'disabled':''}>▼</button>
            </div>
            <div class="exercise-head-left" data-toggle-exercise="${ex.id}">
              <button class="exercise-collapse-btn">${isCollapsed?'▸':'▾'}</button>
              <div class="exercise-name editable" data-edit="exercise|${exPath}" title="Double-click to rename">${escapeHTML(ex.name)}</div>
              ${isCollapsed ? `<div class="exercise-summary">${summary}</div>` : ''}
            </div>
            <button class="btn-ghost btn-tiny" data-save-template="${exPath}">Save as Template</button>
            <button class="btn-ghost btn-tiny" data-remove-exercise="${exPath}">Remove exercise</button>
          </div>
          ${isCollapsed ? '' : `
            ${ungroupedHTML || (ex.groups.length ? '' : '<div class="hint">No steps yet — add the first one below.</div>')}
            ${groupSections}
            <div class="add-step-row">
              <input placeholder="Add step" id="stepinput-${ex.id}">
              <select id="stepgroup-${ex.id}" data-cascade-group="${ex.id}">
                <option value="">No parameter</option>
                ${ex.groups.map(g=>`<option value="${g.id}">${escapeHTML(g.name)}</option>`).join('')}
              </select>
              <select id="stepsubgroup-${ex.id}" data-cascade-subgroup="${ex.id}" disabled>
                <option value="">No subparameter</option>
              </select>
              <select id="stepsubsubgroup-${ex.id}" disabled>
                <option value="">No sub-type</option>
              </select>
              <button class="btn-primary btn-tiny" data-add-step="${student.id}|${p.id}|${ex.id}">Add step</button>
            </div>
            <div class="hint">Pick parameter → subparameter → sub-type before adding, and the step lands directly where it belongs.</div>
            <div class="add-group-row">
              <input placeholder="New parameter, e.g. String set, Position" id="groupinput-${ex.id}">
              <button class="btn-ghost btn-tiny" data-add-group="${student.id}|${p.id}|${ex.id}">Add parameter</button>
            </div>
          `}
        </div>`;
    };

    const pieceBlocksHTML = student.pieces.map((p, pIdx)=>{
      const isCollapsed = state.collapsedPieces.has(p.id);
      const exBlocks = p.exercises.map(ex=>exerciseBlockHTML(p, ex)).join('');
      const stepCount = p.exercises.reduce((n,ex)=>n+ex.steps.length,0);
      const summary = `${p.exercises.length} exercise${p.exercises.length===1?'':'s'} · ${stepCount} step${stepCount===1?'':'s'}`;
      const pPath = `${student.id}|${p.id}`;
      return `
        <div class="piece-block ${isCollapsed?'collapsed':''}">
          <div class="piece-head">
            <div class="step-order">
              <button class="order-btn" data-move-piece="up|${pPath}" ${pIdx===0?'disabled':''}>▲</button>
              <button class="order-btn" data-move-piece="down|${pPath}" ${pIdx===student.pieces.length-1?'disabled':''}>▼</button>
            </div>
            <div class="piece-head-left" data-toggle-piece="${p.id}">
              <button class="piece-collapse-btn">${isCollapsed?'▸':'▾'}</button>
              <div class="piece-name editable" data-edit="piece|${pPath}" title="Double-click to rename">${escapeHTML(p.name)}</div>
              ${isCollapsed ? `<div class="piece-summary">${summary}</div>` : ''}
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0;">
              <select id="copytarget-${p.id}" style="max-width:150px;">${state.students.map(s2=>`<option value="${s2.id}" ${s2.id===student.id?'selected':''}>${escapeHTML(s2.name)}</option>`).join('')}</select>
              <button class="btn-ghost btn-tiny" data-copy-piece="${pPath}">Copy to Student</button>
              <button class="btn-ghost btn-tiny" data-save-piece-template="${pPath}">Save as Template</button>
              <button class="btn-ghost btn-tiny" data-remove-piece="${pPath}">Remove piece</button>
            </div>
          </div>
          ${isCollapsed ? '' : `
            ${exBlocks || '<div class="hint">No exercise types yet for this piece — add one below.</div>'}
            <div class="add-exercise-row">
              <input placeholder="New exercise type, e.g. Chord Transitions" id="exinput-${p.id}">
              <button class="btn-primary btn-tiny" data-add-exercise="${student.id}|${p.id}">Add exercise type</button>
            </div>
          `}
        </div>`;
    }).join('');

    const weeklyExerciseBlockHTML = (p, ex, pieceHasActive)=>{
      if(!ex.groups) ex.groups = [];
      const exHasActive = ex.steps.some(st=>st.thisWeek);
      if(!pieceHasActive) return '';
      const stepsFor = (predicate)=> ex.steps.filter(predicate);
      const ungrouped = stepsFor(st=>!st.groupId);
      const ungroupedHTML = ungrouped.map(st=>stepRowHTML(p, ex, st)).join('');

      const groupSections = ex.groups.map((g, gIdx)=>{
        if(!g.subgroups) g.subgroups = [];
        const directSteps = stepsFor(st=>st.groupId===g.id && !st.subGroupId);
        const directHTML = directSteps.map(st=>stepRowHTML(p, ex, st)).join('');
        const subSections = g.subgroups.map((sg, sgIdx)=>{
          if(!sg.subsubgroups) sg.subsubgroups = [];
          const directSubSteps = stepsFor(st=>st.groupId===g.id && st.subGroupId===sg.id && !st.subSubGroupId);
          const directSubHTML = directSubSteps.map(st=>stepRowHTML(p, ex, st)).join('');
          const subSubSections = sg.subsubgroups.map((ssg, ssgIdx)=>{
            const steps = stepsFor(st=>st.groupId===g.id && st.subGroupId===sg.id && st.subSubGroupId===ssg.id);
            const isSSCollapsed = state.collapsedSubSubgroups.has(ssg.id);
            const ssSummary = `${steps.length} item${steps.length===1?'':'s'}`;
            const ssPath = `${student.id}|${p.id}|${ex.id}|${g.id}|${sg.id}|${ssg.id}`;
            return `
              <div class="subsubgroup-block">
                <div class="subsubgroup-head">
                  <div class="step-order">
                    <button class="order-btn" data-move-subsubgroup="up|${ssPath}" ${ssgIdx===0?'disabled':''}>▲</button>
                    <button class="order-btn" data-move-subsubgroup="down|${ssPath}" ${ssgIdx===sg.subsubgroups.length-1?'disabled':''}>▼</button>
                  </div>
                  <div class="subsubgroup-head-left" data-toggle-subsubgroup="${ssg.id}">
                    <button class="subsubgroup-collapse-btn">${isSSCollapsed?'▸':'▾'}</button>
                    <span class="subsubgroup-name editable" data-edit="subsubgroup|${ssPath}" title="Double-click to rename">${escapeHTML(ssg.name)}</span>
                    ${isSSCollapsed ? `<div class="subsubgroup-summary">${ssSummary}</div>` : ''}
                  </div>
                  <button class="btn-ghost btn-tiny" data-remove-subsubgroup="${ssPath}">Remove</button>
                </div>
                ${isSSCollapsed ? '' : (steps.map(st=>stepRowHTML(p, ex, st)).join('') || '<div class="hint">No steps yet.</div>')}
              </div>`;
          }).join('');
          const isSubCollapsed = state.collapsedSubgroups.has(sg.id);
          const subSummary = `${directSubSteps.length} item${directSubSteps.length===1?'':'s'}`;
          const sgPath = `${student.id}|${p.id}|${ex.id}|${g.id}|${sg.id}`;
          return `
            <div class="subgroup-block">
              <div class="subgroup-head">
                <div class="step-order">
                  <button class="order-btn" data-move-subgroup="up|${sgPath}" ${sgIdx===0?'disabled':''}>▲</button>
                  <button class="order-btn" data-move-subgroup="down|${sgPath}" ${sgIdx===g.subgroups.length-1?'disabled':''}>▼</button>
                </div>
                <div class="subgroup-head-left" data-toggle-subgroup="${sg.id}">
                  <button class="subgroup-collapse-btn">${isSubCollapsed?'▸':'▾'}</button>
                  <span class="subgroup-name editable" data-edit="subgroup|${sgPath}" title="Double-click to rename">${escapeHTML(sg.name)}</span>
                  ${isSubCollapsed ? `<div class="subgroup-summary">${subSummary}</div>` : ''}
                </div>
                <button class="btn-ghost btn-tiny" data-remove-subgroup="${sgPath}">Remove</button>
              </div>
              ${isSubCollapsed ? '' : `
                ${directSubHTML}
                ${subSubSections}
                <div class="add-subsubgroup-row">
                  <input placeholder="New sub-type, e.g. Shape Only" id="subsubgroupinput-${sg.id}">
                  <button class="btn-primary btn-tiny" data-add-subsubgroup="${sgPath}">+ Add sub-type</button>
                </div>
              `}
            </div>`;
        }).join('');

        const isGroupCollapsed = state.collapsedGroups.has(g.id);
        const groupSummary = `${directSteps.length} item${directSteps.length===1?'':'s'}`;
        const gPath = `${student.id}|${p.id}|${ex.id}|${g.id}`;
        return `
          <div class="group-block">
            <div class="group-head">
              <div class="step-order">
                <button class="order-btn" data-move-group="up|${gPath}" ${gIdx===0?'disabled':''}>▲</button>
                <button class="order-btn" data-move-group="down|${gPath}" ${gIdx===ex.groups.length-1?'disabled':''}>▼</button>
              </div>
              <div class="group-head-left" data-toggle-group="${g.id}">
                <button class="group-collapse-btn">${isGroupCollapsed?'▸':'▾'}</button>
                <span class="group-name editable" data-edit="group|${gPath}" title="Double-click to rename">${escapeHTML(g.name)}</span>
                ${isGroupCollapsed ? `<div class="group-summary">${groupSummary}</div>` : ''}
              </div>
              <button class="btn-ghost btn-tiny" data-remove-group="${gPath}">Remove parameter</button>
            </div>
            ${isGroupCollapsed ? '' : `
              ${directHTML}
              ${subSections}
              <div class="add-subgroup-row">
                <input placeholder="New subparameter, e.g. Ascending" id="subgroupinput-${g.id}">
                <button class="btn-ghost btn-tiny" data-add-subgroup="${gPath}">Add subparameter</button>
              </div>
            `}
          </div>`;
      }).join('');

      const totalInEx = ex.steps.filter(st=>st.thisWeek).length;
      const isExCollapsed = state.collapsedExercises.has(ex.id);
      const exSummary = exHasActive ? `${totalInEx} item${totalInEx===1?'':'s'} this week` : 'nothing active this week';
      const exPath = `${student.id}|${p.id}|${ex.id}`;
      const exIdx = p.exercises.findIndex(e=>e.id===ex.id);
      return `
        <div class="exercise-block">
          <div class="exercise-head">
            <div class="step-order">
              <button class="order-btn" data-move-exercise="up|${exPath}" ${exIdx===0?'disabled':''}>▲</button>
              <button class="order-btn" data-move-exercise="down|${exPath}" ${exIdx===p.exercises.length-1?'disabled':''}>▼</button>
            </div>
            <div class="exercise-head-left" data-toggle-exercise="${ex.id}">
              <button class="exercise-collapse-btn">${isExCollapsed?'▸':'▾'}</button>
              <div class="exercise-name editable" data-edit="exercise|${exPath}" title="Double-click to rename">${escapeHTML(ex.name)}</div>
              ${isExCollapsed ? `<div class="exercise-summary">${exSummary}</div>` : ''}
            </div>
            <button class="btn-ghost btn-tiny" data-remove-exercise="${exPath}">Remove exercise</button>
          </div>
          ${isExCollapsed ? '' : `
            ${ungroupedHTML}
            ${groupSections}
            <div class="add-step-row">
              <input placeholder="Add step" id="stepinput-${ex.id}">
              <select id="stepgroup-${ex.id}" data-cascade-group="${ex.id}">
                <option value="">No parameter</option>
                ${ex.groups.map(g=>`<option value="${g.id}">${escapeHTML(g.name)}</option>`).join('')}
              </select>
              <select id="stepsubgroup-${ex.id}" data-cascade-subgroup="${ex.id}" disabled>
                <option value="">No subparameter</option>
              </select>
              <select id="stepsubsubgroup-${ex.id}" disabled>
                <option value="">No sub-type</option>
              </select>
              <button class="btn-primary btn-tiny" data-add-step-week="${exPath}">+ Add step (this week)</button>
            </div>
            <div class="add-group-row">
              <input placeholder="New parameter, e.g. String set, Position" id="groupinput-${ex.id}">
              <button class="btn-ghost btn-tiny" data-add-group="${exPath}">Add parameter</button>
            </div>
          `}
        </div>`;
    };

    const weekPieceSections = student.pieces.map((p, pIdx)=>{
      const pieceHasActive = p.exercises.some(ex=>ex.steps.some(st=>st.thisWeek));
      const exBlocks = p.exercises.map(ex=>weeklyExerciseBlockHTML(p, ex, pieceHasActive)).filter(Boolean).join('');
      if(!exBlocks) return '';
      let total = 0;
      p.exercises.forEach(ex=> ex.steps.forEach(st=>{ if(st.thisWeek) total++; }));
      const isCollapsed = state.collapsedPieces.has(p.id);
      const summary = `${total} item${total===1?'':'s'} this week`;
      const pPath = `${student.id}|${p.id}`;
      return `
        <div class="piece-block ${isCollapsed?'collapsed':''}">
          <div class="piece-head">
            <div class="step-order">
              <button class="order-btn" data-move-piece="up|${pPath}" ${pIdx===0?'disabled':''}>▲</button>
              <button class="order-btn" data-move-piece="down|${pPath}" ${pIdx===student.pieces.length-1?'disabled':''}>▼</button>
            </div>
            <div class="piece-head-left" data-toggle-piece="${p.id}">
              <button class="piece-collapse-btn">${isCollapsed?'▸':'▾'}</button>
              <div class="piece-name editable" data-edit="piece|${pPath}" title="Double-click to rename">${escapeHTML(p.name)}</div>
              <div class="piece-summary">${summary}</div>
            </div>
          </div>
          ${isCollapsed ? '' : exBlocks}
        </div>`;
    }).join('');

    const thisWeekCard = `
      <div class="card">
        <div class="card-title">This Week's Assignment</div>
        ${weekPieceSections || '<div class="empty">Nothing flagged yet. Switch to the Cumulative tab and toggle "This week" on any step to add it here.</div>'}
      </div>`;

    const messageCard = `
      <div class="card">
        <div class="card-title">Next Slack message <button class="btn-ghost btn-tiny" id="copyBtn">Copy</button></div>
        <div class="msg-box" id="msgBox">${escapeHTML(buildMessage(student.id))}</div>
      </div>`;

    const explainerCard = `
      <div class="card">
        <div class="card-title">Explain the System <button class="btn-ghost btn-tiny" id="copyExplainerBtn">Copy</button></div>
        <div class="hint" style="margin-bottom:10px;">Send this once, before their first weekly update, so the labels make sense.</div>
        <div class="msg-box" id="explainerBox">${escapeHTML(buildExplainerMessage(student.id))}</div>
      </div>`;

    const welcomeCard = `
      <div class="card">
        <div class="card-title">Welcome Email <button class="btn-ghost btn-tiny" id="copyWelcomeBtn">Copy</button></div>
        <div class="hint" style="margin-bottom:10px;">Send this to brand-new students when they sign on.</div>
        <div class="msg-box" id="welcomeBox">${escapeHTML(buildWelcomeEmail(student.id))}</div>
      </div>`;

    const pieceOptionsFor = (tid)=> student.pieces.map(p=>`<option value="${p.id}" ${state.lastInsertTarget[tid]===p.id?'selected':''}>${escapeHTML(p.name)}</option>`).join('');
    const isExTplCardCollapsed = state.collapsedTemplateCards.has('exercise');
    const templateLibraryCard = `
      <div class="card">
        <div class="card-title tplcard-title" data-toggle-tplcard="exercise">${isExTplCardCollapsed?'▸':'▾'} Exercise Template Library</div>
        ${isExTplCardCollapsed ? '' : `
          <div class="hint" style="margin-bottom:10px;">Save an exercise and its whole tree (parameters, sub-parameters, sub-types, steps), then drop a fresh copy into any piece for this student.</div>
          ${state.templates.length ? renderGroupedTemplateRows(
            state.templates,
            t=> t.sourcePiece || 'Other',
            t=> templateRowHTML(
              t, `exerciseTemplateTitle|${t.id}`,
              `${(t.groups||[]).length} param${(t.groups||[]).length===1?'':'s'} · ${(t.steps||[]).length} step${(t.steps||[]).length===1?'':'s'}`,
              `${student.pieces.length ? `
                <select id="tplpiece-${t.id}">${pieceOptionsFor(t.id)}</select>
                <button class="btn-primary btn-tiny" data-insert-template="${student.id}|${t.id}">Insert</button>
              ` : '<span class="hint">Add a piece first</span>'}
              <button class="btn-ghost btn-tiny" data-edit-template="exercise|${t.id}">Edit Template</button>
              <button class="btn-ghost btn-tiny" data-remove-template="${t.id}">Remove</button>`,
              renderExerciseTemplateTree,
              t.title || t.name
            )
          ) : '<div class="empty">No templates saved yet. Use "Save as Template" on any exercise in the Cumulative tab.</div>'}
        `}
      </div>`;

    const isPieceTplCardCollapsed = state.collapsedTemplateCards.has('piece');
    const pieceTemplateLibraryCard = `
      <div class="card">
        <div class="card-title tplcard-title" data-toggle-tplcard="piece">${isPieceTplCardCollapsed?'▸':'▾'} Piece Template Library</div>
        ${isPieceTplCardCollapsed ? '' : `
          <div class="hint" style="margin-bottom:10px;">Save the exercise category names inside a piece as a starter list (no parameters or steps), then use it to spin up a brand-new piece with those categories already in place, for this student.</div>
          ${state.pieceTemplates.length ? state.pieceTemplates.map(t=> templateRowHTML(
            t, `pieceTemplateTitle|${t.id}`,
            `${(t.exercises||[]).length} exercise${(t.exercises||[]).length===1?'':'s'}`,
            `<input placeholder="New piece name" id="pctplname-${t.id}" style="width:140px;">
             <button class="btn-primary btn-tiny" data-insert-piece-template="${student.id}|${t.id}">Create piece</button>
             <button class="btn-ghost btn-tiny" data-remove-piece-template="${t.id}">Remove</button>`,
            renderPieceTemplateTree,
            t.title || t.name
          )).join('') : '<div class="empty">No piece templates saved yet. Use "Save as Template" on any piece below.</div>'}
        `}
      </div>`;

    const exerciseOptionsFlat = [];
    student.pieces.forEach(pp=> pp.exercises.forEach(ee=>
      exerciseOptionsFlat.push({ val: `${pp.id}::${ee.id}`, label: `${pp.name}: ${ee.name}` })
    ));
    const groupOptionsFlat = [];
    student.pieces.forEach(pp=> pp.exercises.forEach(ee=> (ee.groups||[]).forEach(gg=>
      groupOptionsFlat.push({ val: `${pp.id}::${ee.id}::${gg.id}`, label: `${pp.name}: ${ee.name}: ${gg.name}` })
    )));
    const subgroupOptionsFlat = [];
    student.pieces.forEach(pp=> pp.exercises.forEach(ee=> (ee.groups||[]).forEach(gg=> (gg.subgroups||[]).forEach(sgg=>
      subgroupOptionsFlat.push({ val: `${pp.id}::${ee.id}::${gg.id}::${sgg.id}`, label: `${pp.name}: ${ee.name}: ${gg.name}: ${sgg.name}` })
    ))));

    const allExerciseNames = [];
    state.students.forEach(s2=> s2.pieces.forEach(pp=> pp.exercises.forEach(ee=>{
      if(!allExerciseNames.includes(ee.name)) allExerciseNames.push(ee.name);
    })));
    allExerciseNames.sort((a,b)=> a.localeCompare(b));

    const assignSourceHtml = (t, collectionName)=> (!t.sourceExercise) && allExerciseNames.length
      ? `<select id="assignsrc-${t.id}">${allExerciseNames.map(n=>`<option value="${escapeAttr(n)}">${escapeHTML(n)}</option>`).join('')}</select>
         <button class="btn-ghost btn-tiny" data-assign-template-source="${collectionName}|${t.id}">File under this exercise</button>`
      : '';

    const paramRows = state.paramTemplates.map(t=>({
      sourceKey: t.sourceExercise || 'Other',
      html: templateRowHTML(
        t, `paramTemplateTitle|${t.id}`,
        `${(t.subgroups||[]).length} subparam${(t.subgroups||[]).length===1?'':'s'} · ${(t.steps||[]).length} step${(t.steps||[]).length===1?'':'s'}`,
        `${assignSourceHtml(t, 'paramTemplates')}
        ${exerciseOptionsFlat.length ? `
          <select id="ptplex-${t.id}">${exerciseOptionsFlat.map(o=>`<option value="${o.val}" ${state.lastInsertTarget[t.id]===o.val?'selected':''}>${escapeHTML(o.label)}</option>`).join('')}</select>
          <button class="btn-primary btn-tiny" data-insert-param-template="${student.id}|${t.id}">Insert</button>
        ` : '<span class="hint">Add an exercise first</span>'}
        <button class="btn-ghost btn-tiny" data-edit-template="param|${t.id}">Edit Template</button>
        <button class="btn-ghost btn-tiny" data-remove-param-template="${t.id}">Remove</button>`,
        renderParamTemplateTree,
        t.title || t.name,
        { cls: 'param', label: 'Parameter' }
      )
    }));
    const subParamRows = state.subParamTemplates.map(t=>({
      sourceKey: t.sourceExercise || 'Other',
      html: templateRowHTML(
        t, `subParamTemplateTitle|${t.id}`,
        `${(t.subsubgroups||[]).length} sub-type${(t.subsubgroups||[]).length===1?'':'s'} · ${(t.steps||[]).length} step${(t.steps||[]).length===1?'':'s'}`,
        `${assignSourceHtml(t, 'subParamTemplates')}
        ${groupOptionsFlat.length ? `
          <select id="sptplgrp-${t.id}">${groupOptionsFlat.map(o=>`<option value="${o.val}" ${state.lastInsertTarget[t.id]===o.val?'selected':''}>${escapeHTML(o.label)}</option>`).join('')}</select>
          <button class="btn-primary btn-tiny" data-insert-subparam-template="${student.id}|${t.id}">Insert</button>
        ` : '<span class="hint">Add a parameter first</span>'}
        <button class="btn-ghost btn-tiny" data-edit-template="subparam|${t.id}">Edit Template</button>
        <button class="btn-ghost btn-tiny" data-remove-subparam-template="${t.id}">Remove</button>`,
        renderSubParamTemplateTree,
        t.title || t.name,
        { cls: 'subparam', label: 'Sub-parameter' }
      )
    }));
    const subTypeRows = state.subTypeTemplates.map(t=>({
      sourceKey: t.sourceExercise || 'Other',
      html: templateRowHTML(
        t, `subTypeTemplateTitle|${t.id}`,
        `${(t.steps||[]).length} step${(t.steps||[]).length===1?'':'s'}`,
        `${assignSourceHtml(t, 'subTypeTemplates')}
        ${subgroupOptionsFlat.length ? `
          <select id="sttplsg-${t.id}">${subgroupOptionsFlat.map(o=>`<option value="${o.val}" ${state.lastInsertTarget[t.id]===o.val?'selected':''}>${escapeHTML(o.label)}</option>`).join('')}</select>
          <button class="btn-primary btn-tiny" data-insert-subtype-template="${student.id}|${t.id}">Insert</button>
        ` : '<span class="hint">Add a sub-parameter first</span>'}
        <button class="btn-ghost btn-tiny" data-edit-template="subtype|${t.id}">Edit Template</button>
        <button class="btn-ghost btn-tiny" data-remove-subtype-template="${t.id}">Remove</button>`,
        renderSubTypeTemplateTree,
        t.title || t.name,
        { cls: 'subtype', label: 'Sub-type' }
      )
    }));

    const allExerciseContentRows = [...paramRows, ...subParamRows, ...subTypeRows];
    const exerciseContentGroups = [];
    allExerciseContentRows.forEach(r=>{
      let g = exerciseContentGroups.find(x=>x.key===r.sourceKey);
      if(!g){ g = { key: r.sourceKey, htmls: [] }; exerciseContentGroups.push(g); }
      g.htmls.push(r.html);
    });

    const exerciseContentCards = exerciseContentGroups.map(g=>{
      const cardKey = 'ex-src:' + g.key;
      const isCollapsed = state.collapsedTemplateCards.has(cardKey);
      const bulkAssignHtml = (g.key==='Other' && allExerciseNames.length) ? `
        <div class="add-group-row" style="margin-bottom:12px;">
          <select id="bulkassignsrc">${allExerciseNames.map(n=>`<option value="${escapeAttr(n)}">${escapeHTML(n)}</option>`).join('')}</select>
          <button class="btn-primary btn-tiny" data-bulk-assign-source>File ALL of these under this exercise</button>
        </div>` : '';
      return `
        <div class="card">
          <div class="card-title tplcard-title" data-toggle-tplcard="${escapeAttr(cardKey)}">${isCollapsed?'▸':'▾'} ${escapeHTML(g.key)} Templates</div>
          ${isCollapsed ? '' : `
            <div class="hint" style="margin-bottom:10px;">${g.key==='Other' ? 'Not yet filed under an exercise.' : `From any "${escapeHTML(g.key)}" exercise, across every piece.`}</div>
            ${bulkAssignHtml}
            ${g.htmls.join('')}
          `}
        </div>`;
    }).join('');

    const exerciseContentTemplateLibraryCard = allExerciseContentRows.length
      ? exerciseContentCards
      : `<div class="card">
          <div class="card-title">Exercise Content Templates</div>
          <div class="hint" style="margin-bottom:10px;">Parameters, sub-parameters, and sub-types you've saved will each show up here in their own box, named after the exercise they came from.</div>
          <div class="empty">No parameter, sub-parameter, or sub-type templates saved yet. Use "Save as Template" on any of those levels in the Cumulative tab.</div>
        </div>`;

    const templatesCard = pieceTemplateLibraryCard + templateLibraryCard + exerciseContentTemplateLibraryCard;

    const cumulativeCard = `
      <div class="card">
        <div class="card-title">${escapeHTML(student.name)}'s full history</div>
        <div class="hint" style="margin-bottom:10px;">Piece → Exercise → Parameter → Step. Toggle "This week" on any step to add it to the current assignment.</div>
        ${pieceBlocksHTML || '<div class="empty">No pieces yet for this student — add one below.</div>'}
        <div class="add-piece-row">
          <input placeholder="New piece, e.g. Rocky Mountain High" id="pieceinput-${student.id}">
          <button class="btn-primary btn-tiny" data-add-piece="${student.id}">Add piece</button>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="border-color:var(--string);"></div>Standby</div>
          <div class="legend-item"><div class="legend-dot in_process"></div>Waiting for Submission</div>
          <div class="legend-item"><div class="legend-dot refining"></div>Almost There</div>
          <div class="legend-item"><div class="legend-dot needs_review"></div>Review (in rotation)</div>
          <div class="legend-item"><div class="legend-dot locked_in"></div>Locked In</div>
        </div>
      </div>`;

    const builtInScriptsHTML = BUILT_IN_SCRIPTS.map(sc=>`
      <div class="exercise-block">
        <div class="exercise-head" style="margin-bottom:8px;">
          <div class="exercise-name">${escapeHTML(sc.label)}</div>
          <button class="btn-ghost btn-tiny" data-copy-script="builtin-${sc.key}">Copy</button>
        </div>
        <div class="msg-box" id="scriptbox-builtin-${sc.key}">${escapeHTML(sc.build(student))}</div>
      </div>`).join('');

    const customScriptsHTML = state.customScripts.length ? state.customScripts.map(sc=>`
      <div class="exercise-block">
        <div class="exercise-head" style="margin-bottom:8px;">
          <div class="exercise-name editable" data-edit="scriptTitle|${sc.id}" title="Double-click to rename">${escapeHTML(sc.title)}</div>
          <div style="display:flex;gap:6px;">
            <button class="btn-ghost btn-tiny" data-copy-script="custom-${sc.id}">Copy</button>
            <button class="btn-ghost btn-tiny" data-remove-script="${sc.id}">Remove</button>
          </div>
        </div>
        <div class="msg-box" id="scriptbox-custom-${sc.id}">${escapeHTML(sc.body.replace(/\{name\}/gi, firstName(student)))}</div>
        <div class="hint">Use {name} anywhere in the script to insert the student's first name.</div>
      </div>`).join('') : '<div class="empty">No custom scripts yet. Add one below.</div>';

    const scriptsCard = `
      <div class="card">
        <div class="card-title">Scenario Scripts</div>
        <div class="hint" style="margin-bottom:12px;">Ready-to-send responses for common situations. Names fill in automatically for whichever student is selected.</div>
        ${builtInScriptsHTML}
      </div>
      <div class="card">
        <div class="card-title">Your Custom Scripts</div>
        ${customScriptsHTML}
        <div class="add-group-row" style="flex-direction:column;align-items:stretch;">
          <input placeholder="Script title, e.g. Missed a lesson" id="newScriptTitle" style="margin-bottom:8px;">
          <textarea placeholder="Script text. Use {name} for the student's first name." id="newScriptBody" rows="3" style="width:100%;background:var(--rosewood-light);border:1px solid var(--hairline);color:var(--bone);border-radius:6px;padding:8px 10px;font-family:'Inter',sans-serif;font-size:13.5px;margin-bottom:8px;resize:vertical;"></textarea>
          <button class="btn-primary btn-tiny" id="addScriptBtn" style="align-self:flex-start;">Add script</button>
        </div>
      </div>`;

    body = state.view === 'week' ? (messageCard + thisWeekCard)
      : state.view === 'cumulative' ? cumulativeCard
      : state.view === 'templates' ? templatesCard
      : state.view === 'explain' ? explainerCard
      : state.view === 'welcome' ? welcomeCard
      : scriptsCard;
  }

  root.innerHTML = `
    <h1>Ladder</h1>
    <p class="subtitle">Piece → Exercise → Parameter → Step, per student.</p>
    ${state.saveError ? `
      <div style="background:rgba(178,78,56,.18);border:1px solid var(--rust);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;">
        <div style="color:var(--bone);font-size:13.5px;">⚠️ Couldn't save your last change (${escapeHTML(state.saveError)}) — it may not have persisted. Try again, and consider exporting a backup below.</div>
        <div style="display:flex;gap:8px;">
          <button class="btn-primary btn-tiny" id="retrySaveBtn">Retry Save</button>
          <button class="btn-ghost btn-tiny" id="dismissSaveErrorBtn">Dismiss</button>
        </div>
      </div>
    ` : ''}
    ${state.importError ? `
      <div style="background:rgba(178,78,56,.18);border:1px solid var(--rust);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;">
        <div style="color:var(--bone);font-size:13.5px;">⚠️ Import failed: ${escapeHTML(state.importError)}</div>
        <button class="btn-ghost btn-tiny" id="dismissImportErrorBtn">Dismiss</button>
      </div>
    ` : ''}
    ${state.pendingImport ? `
      <div style="background:rgba(195,155,87,.18);border:1px solid var(--brass);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;">
        <div style="color:var(--bone);font-size:13.5px;">📥 Ready to import: ${state.pendingImport.students.length} student${state.pendingImport.students.length===1?'':'s'} found in this file. This will <strong>replace</strong> everything currently loaded here. This can't be undone.</div>
        <div style="display:flex;gap:8px;">
          <button class="btn-primary btn-tiny" id="confirmImportBtn">Confirm Import</button>
          <button class="btn-ghost btn-tiny" id="cancelImportBtn">Cancel</button>
        </div>
      </div>
    ` : ''}
    <input id="studentSearchInput" placeholder="Search students…" value="${escapeAttr(state.studentSearch)}" style="margin-bottom:10px;width:220px;">
    <div class="student-row">
      ${chips}
      <div class="add-student">
        <input id="newStudentName" placeholder="New student name">
        <button class="btn-primary btn-tiny" id="addStudentBtn">Add</button>
      </div>
      <button class="btn-ghost btn-tiny" id="exportDataBtn">Export Backup</button>
      <button class="btn-ghost btn-tiny" id="importDataBtn">Import Backup</button>
      <input type="file" id="importDataFile" accept="application/json" style="display:none;">
    </div>
    ${student ? `
      <div class="view-tabs">
        <div class="view-tab ${state.view==='week'?'active':''}" data-view="week">This Week</div>
        <div class="view-tab ${state.view==='cumulative'?'active':''}" data-view="cumulative">Cumulative</div>
        <div class="view-tab ${state.view==='templates'?'active':''}" data-view="templates">Templates</div>
        <div class="view-tab ${state.view==='explain'?'active':''}" data-view="explain">Explain System</div>
        <div class="view-tab ${state.view==='welcome'?'active':''}" data-view="welcome">Welcome Email</div>
        <div class="view-tab ${state.view==='scripts'?'active':''}" data-view="scripts">Scripts</div>
      </div>
    ` : ''}
    ${body}
    ${renderTemplateEditorOverlay()}
  `;
  bind();
}

function copyText(text, btn){
  const orig = btn.dataset.origLabel || btn.innerText;
  btn.dataset.origLabel = orig;
  const done = (label)=>{ btn.innerText = label; setTimeout(()=>{ btn.innerText = orig; }, 1600); };
  const fallback = ()=>{
    try{
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      done(ok ? 'Copied' : 'Select text & Ctrl+C');
    }catch(e){
      done('Select text & Ctrl+C');
    }
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=> done('Copied')).catch(fallback);
  } else {
    fallback();
  }
}

function promptInline(btn, defaultValue, onSubmit){
  const wrapper = document.createElement('span');
  wrapper.style.display = 'inline-flex';
  wrapper.style.gap = '4px';
  wrapper.style.alignItems = 'center';
  const input = document.createElement('input');
  input.value = defaultValue || '';
  input.placeholder = 'Template name';
  input.style.width = '150px';
  input.style.fontSize = '11.5px';
  input.style.padding = '5px 8px';
  const confirmBtn = document.createElement('button');
  confirmBtn.textContent = 'Save';
  confirmBtn.className = 'btn-primary btn-tiny';
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '✕';
  cancelBtn.className = 'btn-ghost btn-tiny';
  wrapper.appendChild(input);
  wrapper.appendChild(confirmBtn);
  wrapper.appendChild(cancelBtn);
  btn.replaceWith(wrapper);
  input.focus(); input.select();
  let done = false;
  const submit = ()=>{ if(done) return; done = true; onSubmit(input.value); };
  const cancel = ()=>{ if(done) return; done = true; render(); };
  confirmBtn.onclick = submit;
  cancelBtn.onclick = cancel;
  input.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); submit(); }
    if(e.key==='Escape'){ e.preventDefault(); cancel(); }
  });
}

  if(tplEditorOverlay) tplEditorOverlay.onclick = (e)=>{ if(e.target.id==='tplEditorOverlay'){ state.templateEditMode = null; render(); } };

  // Exercise template editor CRUD
  document.querySelectorAll('[data-ex-tpl-add-param]').forEach(el=>{
    el.onclick = ()=>{ const tid = el.dataset.exTplAddParam; const inp = document.getElementById('exTplParamIn-'+tid); addExTplParam(tid, inp.value); };
  });
  document.querySelectorAll('[data-ex-tpl-remove-param]').forEach(el=>{
    el.onclick = ()=>{ const [tid, gid] = el.dataset.exTplRemoveParam.split('|'); removeExTplParam(tid, gid); };
  });
  document.querySelectorAll('[data-ex-tpl-add-subparam]').forEach(el=>{
    el.onclick = ()=>{ const [tid, gid] = el.dataset.exTplAddSubparam.split('|'); const inp = document.getElementById(`exTplSubparamIn-${tid}-${gid}`); addExTplSubparam(tid, gid, inp.value); };
  });
  document.querySelectorAll('[data-ex-tpl-remove-subparam]').forEach(el=>{
    el.onclick = ()=>{ const [tid, gid, sgid] = el.dataset.exTplRemoveSubparam.split('|'); removeExTplSubparam(tid, gid, sgid); };
  });
  document.querySelectorAll('[data-ex-tpl-add-subtype]').forEach(el=>{
    el.onclick = ()=>{ const [tid, gid, sgid] = el.dataset.exTplAddSubtype.split('|'); const inp = document.getElementById(`exTplSubtypeIn-${tid}-${gid}-${sgid}`); addExTplSubtype(tid, gid, sgid, inp.value); };
  });
  document.querySelectorAll('[data-ex-tpl-remove-subtype]').forEach(el=>{
    el.onclick = ()=>{ const [tid, gid, sgid, ssgid] = el.dataset.exTplRemoveSubtype.split('|'); removeExTplSubtype(tid, gid, sgid, ssgid); };
  });
  document.querySelectorAll('[data-ex-tpl-add-step]').forEach(el=>{
    el.onclick = ()=>{
      const [tid, gid, sgid, ssgid] = el.dataset.exTplAddStep.split('|');
      const idSuffix = ssgid ? `${tid}-${gid}-${sgid}-${ssgid}` : (sgid ? `${tid}-${gid}-${sgid}` : `${tid}-${gid}`);
      const inp = document.getElementById('exTplStepIn-'+idSuffix) || document.getElementById('exTplDirectStepIn-'+idSuffix) || document.getElementById('exTplDirectStepIn2-'+tid+'-'+gid);
      if(inp) addExTplStep(tid, gid||null, sgid||null, ssgid||null, inp.value);
    };
  });
  document.querySelectorAll('[data-ex-tpl-remove-step]').forEach(el=>{
    el.onclick = ()=>{ const [tid, stid] = el.dataset.exTplRemoveStep.split('|'); removeExTplStep(tid, stid); };
  });

  // Parameter template editor CRUD
  document.querySelectorAll('[data-param-tpl-add-subparam]').forEach(el=>{
    el.onclick = ()=>{ const tid = el.dataset.paramTplAddSubparam; const inp = document.getElementById('paramTplSubparamIn-'+tid); addParamTplSubparam(tid, inp.value); };
  });
  document.querySelectorAll('[data-param-tpl-remove-subparam]').forEach(el=>{
    el.onclick = ()=>{ const [tid, sgid] = el.dataset.paramTplRemoveSubparam.split('|'); removeParamTplSubparam(tid, sgid); };
  });
  document.querySelectorAll('[data-param-tpl-add-subtype]').forEach(el=>{
    el.onclick = ()=>{ const [tid, sgid] = el.dataset.paramTplAddSubtype.split('|'); const inp = document.getElementById(`paramTplSubtypeIn-${tid}-${sgid}`); addParamTplSubtype(tid, sgid, inp.value); };
  });
  document.querySelectorAll('[data-param-tpl-remove-subtype]').forEach(el=>{
    el.onclick = ()=>{ const [tid, sgid, ssgid] = el.dataset.paramTplRemoveSubtype.split('|'); removeParamTplSubtype(tid, sgid, ssgid); };
  });
  document.querySelectorAll('[data-param-tpl-add-step]').forEach(el=>{
    el.onclick = ()=>{
      const [tid, sgid, ssgid] = el.dataset.paramTplAddStep.split('|');
      const idSuffix = ssgid ? `${tid}-${sgid}-${ssgid}` : (sgid ? `${tid}-${sgid}` : tid);
      const inp = document.getElementById('paramTplStepIn-'+idSuffix) || document.getElementById('paramTplDirectStepIn-'+idSuffix) || document.getElementById('paramTplDirectStepIn2-'+tid);
      if(inp) addParamTplStep(tid, sgid||null, ssgid||null, inp.value);
    };
  });
  document.querySelectorAll('[data-param-tpl-remove-step]').forEach(el=>{
    el.onclick = ()=>{ const [tid, stid] = el.dataset.paramTplRemoveStep.split('|'); removeParamTplStep(tid, stid); };
  });

  // Sub-parameter template editor CRUD
  document.querySelectorAll('[data-subparam-tpl-add-subtype]').forEach(el=>{
    el.onclick = ()=>{ const tid = el.dataset.subparamTplAddSubtype; const inp = document.getElementById('subparamTplSubtypeIn-'+tid); addSubParamTplSubtype(tid, inp.value); };
  });
  document.querySelectorAll('[data-subparam-tpl-remove-subtype]').forEach(el=>{
    el.onclick = ()=>{ const [tid, ssgid] = el.dataset.subparamTplRemoveSubtype.split('|'); removeSubParamTplSubtype(tid, ssgid); };
  });
  document.querySelectorAll('[data-subparam-tpl-add-step]').forEach(el=>{
    el.onclick = ()=>{
      const [tid, ssgid] = el.dataset.subparamTplAddStep.split('|');
      const idSuffix = ssgid ? `${tid}-${ssgid}` : tid;
      const inp = document.getElementById('subparamTplStepIn-'+idSuffix) || document.getElementById('subparamTplDirectStepIn-'+tid);
      if(inp) addSubParamTplStep(tid, ssgid||null, inp.value);
    };
  });
  document.querySelectorAll('[data-subparam-tpl-remove-step]').forEach(el=>{
    el.onclick = ()=>{ const [tid, stid] = el.dataset.subparamTplRemoveStep.split('|'); removeSubParamTplStep(tid, stid); };
  });

  // Sub-type template editor CRUD
  document.querySelectorAll('[data-subtype-tpl-add-step]').forEach(el=>{
    el.onclick = ()=>{ const tid = el.dataset.subtypeTplAddStep; const inp = document.getElementById('subtypeTplStepIn-'+tid); addSubTypeTplStep(tid, inp.value); };
  });
  document.querySelectorAll('[data-subtype-tpl-remove-step]').forEach(el=>{
    el.onclick = ()=>{ const [tid, stid] = el.dataset.subtypeTplRemoveStep.split('|'); removeSubTypeTplStep(tid, stid); };
  });

  const studentSearchInput = document.getElementById('studentSearchInput');
  if(studentSearchInput){
    studentSearchInput.oninput = ()=>{
      const cursorPos = studentSearchInput.selectionStart;
      state.studentSearch = studentSearchInput.value;
      render();
      const freshInput = document.getElementById('studentSearchInput');
      if(freshInput){
        freshInput.focus();
        freshInput.setSelectionRange(cursorPos, cursorPos);
      }
    };
  }
  const ns = document.getElementById('newStudentName');
  if(ns) ns.addEventListener('keydown', e=>{ if(e.key==='Enter') addStudentBtn.click(); });
}

load();
</script>
</body>
</html>
