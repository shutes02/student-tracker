<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ladder — Lesson Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

:root{
  --walnut: #1E1611;
  --rosewood: #2E211A;
  --rosewood-light: #3A2A20;
  --rosewood-lighter: #46352A;
  --bone: #ECE1CB;
  --bone-dim: #B7A98C;
  --string: #8C7F68;
  --brass: #C39B57;
  --sage: #8FA37E;
  --amber: #D9903F;
  --copper: #C97D53;
  --rust: #B24E38;
  --hairline: #493A2C;
}
*{box-sizing:border-box;}
body{margin:0;background:transparent;color:var(--bone);font-family:'Inter',sans-serif;}
.app{background:var(--walnut);min-height:100vh;color:var(--bone);padding:36px 44px;max-width:940px;margin:0 auto;}

h1{font-family:'Bitter',serif;font-size:23px;font-weight:700;margin:0 0 4px;color:var(--bone);}
.subtitle{color:var(--string);font-size:13.5px;margin:0 0 24px;}

.student-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:26px;}
.student-chip{padding:7px 14px;border-radius:20px;background:var(--rosewood);border:1px solid var(--hairline);font-size:13px;font-weight:500;cursor:pointer;color:var(--bone-dim);}
.student-chip.active{background:var(--brass);color:var(--walnut);border-color:var(--brass);}
.student-chip .chip-x{margin-left:8px;color:var(--string);font-weight:700;}
.student-chip.active .chip-x{color:var(--walnut);opacity:.6;}
.add-student{display:flex;gap:6px;align-items:center;}
.add-student input{width:150px;}

.view-tabs{display:flex;gap:8px;margin-bottom:22px;border-bottom:1px solid var(--hairline);}
.view-tab{padding:9px 4px;font-size:13.5px;font-weight:600;color:var(--string);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.view-tab.active{color:var(--brass);border-bottom-color:var(--brass);}

.card{background:var(--rosewood);border:1px solid var(--hairline);border-radius:10px;padding:20px 22px;margin-bottom:16px;}
.card-title{font-family:'Bitter',serif;font-weight:600;font-size:16px;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;}

button{font-family:'Inter',sans-serif;cursor:pointer;border:none;border-radius:7px;font-weight:600;font-size:13px;padding:9px 15px;transition:opacity .15s;}
button:hover{opacity:.88;}
.btn-primary{background:var(--brass);color:var(--walnut);}
.btn-ghost{background:var(--rosewood-lighter);color:var(--bone);}
.btn-tiny{padding:5px 10px;font-size:11.5px;border-radius:6px;}

input,select{font-family:'Inter',sans-serif;background:var(--rosewood-light);border:1px solid var(--hairline);color:var(--bone);border-radius:6px;padding:8px 10px;font-size:13.5px;}
input:focus,select:focus{outline:1px solid var(--brass);}

/* Piece level */
.piece-block{border:1px solid var(--hairline);border-radius:10px;padding:16px 18px;margin-bottom:16px;background:var(--rosewood-light);}
.piece-head{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px;}
.piece-head-left{display:flex;align-items:center;gap:8px;cursor:pointer;flex:1;min-width:160px;}
.piece-collapse-btn{background:none;border:none;color:var(--string);font-size:11px;cursor:pointer;padding:2px 4px;flex-shrink:0;transition:color .15s;}
.piece-collapse-btn:hover{color:var(--brass);}
.piece-summary{font-size:11.5px;color:var(--string);font-family:'IBM Plex Mono',monospace;}
.piece-block.collapsed{padding-bottom:16px;}
.piece-block.collapsed .piece-head{margin-bottom:0;}
.piece-name{font-family:'Bitter',serif;font-weight:700;font-size:15.5px;color:var(--sage);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.piece-name::before{content:"♪ ";opacity:.7;}

/* Exercise level */
.exercise-block{border:1px solid var(--hairline);border-radius:8px;padding:14px 16px;margin-bottom:10px;background:var(--rosewood-lighter);}
.exercise-head{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px;}
.exercise-head-left{display:flex;align-items:center;gap:8px;cursor:pointer;flex:1;min-width:140px;}
.exercise-collapse-btn{background:none;border:none;color:var(--string);font-size:11px;cursor:pointer;padding:2px 4px;flex-shrink:0;transition:color .15s;}
.exercise-collapse-btn:hover{color:var(--brass);}
.exercise-summary{font-size:11px;color:var(--string);font-family:'IBM Plex Mono',monospace;}
.exercise-block.collapsed{margin-bottom:10px;}
.exercise-block.collapsed .exercise-head{margin-bottom:0;}
.exercise-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Parameter level */
.group-block{margin:12px 0;padding-left:10px;border-left:2px solid var(--brass);}
.group-head{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:8px;}
.group-head-left{display:flex;align-items:center;gap:6px;cursor:pointer;flex:1;min-width:140px;}
.group-collapse-btn{background:none;border:none;color:var(--string);font-size:10px;cursor:pointer;padding:2px 3px;flex-shrink:0;transition:color .15s;}
.group-collapse-btn:hover{color:var(--brass);}
.group-summary{font-size:10.5px;color:var(--string);font-family:'IBM Plex Mono',monospace;}
.group-name{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--brass);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.group-select{font-family:'Inter',sans-serif;background:var(--rosewood-light);border:1px solid var(--hairline);color:var(--bone-dim);border-radius:6px;padding:3px 6px;font-size:11px;flex-shrink:0;}

/* Sub-parameter level */
.subgroup-block{margin:10px 0 10px 14px;padding-left:10px;border-left:2px dashed var(--rust);}
.subgroup-head{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:8px;}
.subgroup-head-left{display:flex;align-items:center;gap:6px;cursor:pointer;flex:1;min-width:140px;}
.subgroup-collapse-btn{background:none;border:none;color:var(--rust);font-size:10px;cursor:pointer;padding:2px 3px;flex-shrink:0;transition:color .15s;}
.subgroup-collapse-btn:hover{color:var(--sage);}
.subgroup-summary{font-size:10.5px;color:var(--string);font-family:'IBM Plex Mono',monospace;}
.subgroup-name{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--rust);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.add-subgroup-row{display:flex;gap:6px;margin-top:8px;}
.add-subgroup-row input{flex:1;}

/* Sub-type level */
.subsubgroup-block{margin:8px 0 8px 14px;padding-left:10px;border-left:2px dotted var(--sage);}
.subsubgroup-head{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:8px;}
.subsubgroup-head-left{display:flex;align-items:center;gap:6px;cursor:pointer;flex:1;min-width:140px;}
.subsubgroup-collapse-btn{background:none;border:none;color:var(--sage);font-size:11px;cursor:pointer;padding:2px 3px;flex-shrink:0;}
.subsubgroup-collapse-btn:hover{color:var(--bone);}
.subsubgroup-summary{font-size:10.5px;color:var(--bone-dim);font-family:'IBM Plex Mono',monospace;}
.subsubgroup-name{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--sage);text-decoration:underline;text-decoration-color:var(--sage);text-underline-offset:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.add-subsubgroup-row{display:flex;gap:6px;margin-top:10px;padding:8px;background:rgba(196,196,188,.06);border:1px dashed var(--string);border-radius:6px;}
.add-subsubgroup-row input{flex:1;}
.subsubgroup-select{font-family:'Inter',sans-serif;background:var(--rosewood-light);border:1px solid var(--hairline);color:var(--bone-dim);border-radius:6px;padding:3px 6px;font-size:11px;}

/* Step level */
.step-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--hairline);flex-wrap:wrap;}
.step-row:last-child{border-bottom:none;}
.step-row.in-week{background:rgba(195,155,87,.08);border-radius:6px;padding-left:6px;padding-right:6px;margin:0 -6px;}
.step-order{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.order-btn{background:none;border:none;color:var(--string);cursor:pointer;font-size:10px;padding:0 4px;line-height:1;}
.order-btn:hover{color:var(--brass);}
.step-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--hairline);flex-shrink:0;}
.step-dot.in_process{border-color:var(--amber);background:var(--amber);}
.step-dot.refining{border-color:var(--copper);background:var(--copper);}
.step-dot.needs_review{border-color:var(--sage);background:var(--sage);}
.step-dot.locked_in{border-color:var(--brass);background:var(--brass);}
.step-label{flex:1;font-size:13.5px;min-width:110px;}
.status-group{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.status-btn{padding:4px 9px;border-radius:6px;font-size:10.5px;font-weight:600;background:var(--rosewood-lighter);color:var(--string);cursor:pointer;border:1px solid transparent;}
.status-btn.sel-not_started{background:var(--rosewood-lighter);color:var(--bone-dim);border-color:var(--string);}
.status-btn.sel-in_process{background:rgba(217,144,63,.18);color:var(--amber);border-color:var(--amber);}
.status-btn.sel-refining{background:rgba(201,125,83,.2);color:var(--copper);border-color:var(--copper);}
.status-btn.sel-needs_review{background:rgba(143,163,126,.2);color:var(--sage);border-color:var(--sage);}
.status-btn.sel-locked_in{background:rgba(195,155,87,.2);color:var(--brass);border-color:var(--brass);}
.week-toggle{padding:4px 9px;border-radius:6px;font-size:10.5px;font-weight:600;background:var(--rosewood-lighter);color:var(--string);cursor:pointer;border:1px solid var(--hairline);white-space:nowrap;flex-shrink:0;}
.week-toggle.on{background:var(--brass);color:var(--walnut);border-color:var(--brass);}
.step-remove{color:var(--string);cursor:pointer;font-size:14px;padding:0 3px;flex-shrink:0;}
.step-remove:hover{color:var(--rust);}

.add-step-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.add-step-row input{flex:1;min-width:140px;}
.add-group-row{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--hairline);}
.add-group-row input{flex:1;}
.add-exercise-row{display:flex;gap:6px;margin-top:8px;}
.add-exercise-row input{flex:1;}
.add-piece-row{display:flex;gap:6px;margin-top:6px;}
.add-piece-row input{flex:1;}

.empty{color:var(--string);font-size:13.5px;padding:18px 4px;}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--string);}
.legend-item{display:flex;align-items:center;gap:6px;}
.legend-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--hairline);}
.legend-dot.in_process{border-color:var(--amber);background:var(--amber);}
.legend-dot.refining{border-color:var(--copper);background:var(--copper);}
.legend-dot.needs_review{border-color:var(--sage);background:var(--sage);}
.legend-dot.locked_in{border-color:var(--brass);background:var(--brass);}

.msg-box{background:var(--rosewood-light);border:1px dashed var(--hairline);border-radius:8px;padding:14px 16px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.7;white-space:pre-wrap;color:var(--bone);}
.hint{font-size:11.5px;color:var(--string);margin-top:6px;line-height:1.5;}
.list-row{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--hairline);gap:10px;}
.list-row:last-child{border-bottom:none;}
.list-row-name{font-weight:600;font-size:13.5px;}
.list-row-meta{font-size:11px;color:var(--string);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
.tplcard-title{cursor:pointer;user-select:none;}
.tplrow-wrap{border-bottom:1px solid var(--hairline);}
.tplrow-wrap:last-child{border-bottom:none;}
.tplrow-wrap .list-row{border-bottom:none;}
.tplrow-toggle{background:none;border:none;color:var(--string);cursor:pointer;font-size:10px;padding:2px 5px 2px 0;}
.tplrow-toggle:hover{color:var(--brass);}
.tpl-source-header{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--string);margin:14px 0 6px;padding-top:12px;border-top:1px solid var(--hairline);}
.tpl-source-header:first-child{margin-top:0;padding-top:0;border-top:none;}
.tpl-editor-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
.tpl-editor-modal{background:var(--rosewood);border:1px solid var(--hairline);border-radius:12px;max-width:820px;width:100%;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.tpl-editor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:12px;}
.tpl-editor-title{font-family:'Bitter',serif;font-weight:700;font-size:19px;color:var(--bone);}
.tpl-editor-add-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 16px;padding:10px;background:var(--rosewood-light);border:1px dashed var(--hairline);border-radius:8px;}
.tpl-editor-add-row input{flex:1;min-width:160px;}
.tpltree{padding:4px 0 12px 18px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;line-height:1.9;}
.tpltree-row{display:flex;gap:6px;align-items:baseline;}
.tpltree-tag{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:1px 6px;border-radius:4px;flex-shrink:0;}
.tpltree-tag.exercise{background:rgba(196,196,188,.15);color:var(--bone-dim);}
.tpltree-tag.piece{background:rgba(143,163,126,.2);color:var(--sage);}
.tpltree-tag.param{background:rgba(195,155,87,.18);color:var(--brass);}
.tpltree-tag.subparam{background:rgba(178,78,56,.18);color:var(--rust);}
.tpltree-tag.subtype{background:rgba(143,163,126,.2);color:var(--sage);}
.tpltree-tag.step{background:rgba(196,196,188,.1);color:var(--string);}
.tpltree-name{color:var(--bone);}
.editable{cursor:text;}
.editable:hover{text-decoration:underline dotted;text-underline-offset:3px;}
.inline-edit{font-family:inherit;font-size:inherit;font-weight:inherit;color:var(--bone);background:var(--rosewood-lighter);border:1px solid var(--brass);border-radius:5px;padding:2px 6px;width:100%;box-sizing:border-box;}
</style>
</head>
<body>
<div id="root" class="app"></div>

<script>
// Standalone compatibility: if window.storage isn't provided (i.e. this file
// is opened directly in a browser or hosted elsewhere, not inside Claude.ai),
// fall back to localStorage with the same API shape. This makes the file
// fully self-contained and independent of Claude.ai's artifact environment.
if(!window.storage){
  window.storage = {
    get: async (key)=>{
      const val = localStorage.getItem('ladder:'+key);
      return val === null ? null : { key, value: val };
    },
    set: async (key, value)=>{
      localStorage.setItem('ladder:'+key, value);
      return { key, value };
    },
    delete: async (key)=>{
      const existed = localStorage.getItem('ladder:'+key) !== null;
      localStorage.removeItem('ladder:'+key);
      return { key, deleted: existed };
    },
    list: async (prefix)=>{
      const keys = [];
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(k && k.startsWith('ladder:')){
          const stripped = k.slice(7);
          if(!prefix || stripped.startsWith(prefix)) keys.push(stripped);
        }
      }
      return { keys, prefix };
    }
  };
}

const KEY_V3 = 'tracker-data-v3';
const KEY_V2 = 'tracker-data-v2';
const TEMPLATES_KEY = 'templates-v1';
const PIECE_TEMPLATES_KEY = 'piece-templates-v1';
const PARAM_TEMPLATES_KEY = 'param-templates-v1';
const SUBPARAM_TEMPLATES_KEY = 'subparam-templates-v1';
const SUBTYPE_TEMPLATES_KEY = 'subtype-templates-v1';
const SCRIPTS_KEY = 'custom-scripts-v1';
const STATUS = ['not_started','in_process','refining','needs_review','locked_in'];
const STATUS_LABEL = { not_started: 'Standby', in_process: 'Waiting for Submission', refining: 'Almost There', needs_review: 'Review', locked_in: 'Locked In' };

let state = { students: [], templates: [], pieceTemplates: [], paramTemplates: [], subParamTemplates: [], subTypeTemplates: [], customScripts: [], selected: null, loaded: false, view: 'week', collapsedPieces: new Set(), collapsedExercises: new Set(), collapsedGroups: new Set(), collapsedSubgroups: new Set(), collapsedSubSubgroups: new Set(), collapsedTemplateCards: new Set(), collapsedTemplateRows: new Set(), saveError: null, lastInsertTarget: {}, templateEditMode: null, pendingImport: null, importError: null, studentSearch: '' };

function uid(){ return Math.random().toString(36).slice(2,10); }

async function load(){
  try{
    const r = await window.storage.get(KEY_V3);
    if(r){ state.students = JSON.parse(r.value); }
    else {
      let migrated = [];
      try{
        const old = await window.storage.get(KEY_V2);
        if(old){
          const oldStudents = JSON.parse(old.value);
          migrated = oldStudents.map(s=>({
            id: s.id, name: s.name,
            pieces: [{ id: uid(), name: 'General', exercises: (s.exercises||[]).map(ex=>({ id: ex.id, name: ex.name, groups: ex.groups||[], steps: ex.steps||[] })) }]
          }));
        }
      }catch(e){}
      state.students = migrated;
    }
  }catch(e){ state.students = []; }
  (state.students||[]).forEach(s=>{
    (s.pieces||[]).forEach(p=>{
      p.exercises.forEach(ex=>{
        ex.steps.forEach(st=>{ if(st.status==='retry') st.status = 'refining'; });
      });
    });
  });
  state.loaded = true;
  if(state.students.length && !state.selected) state.selected = state.students[0].id;
  if(state.selected) applyDefaultCollapseForStudent(state.selected);
  try{
    const t = await window.storage.get(TEMPLATES_KEY);
    state.templates = t ? JSON.parse(t.value) : [];
  }catch(e){ state.templates = []; }
  try{
    const pt = await window.storage.get(PIECE_TEMPLATES_KEY);
    state.pieceTemplates = pt ? JSON.parse(pt.value) : [];
  }catch(e){ state.pieceTemplates = []; }
  try{
    const prt = await window.storage.get(PARAM_TEMPLATES_KEY);
    state.paramTemplates = prt ? JSON.parse(prt.value) : [];
  }catch(e){ state.paramTemplates = []; }
  try{
    const spt = await window.storage.get(SUBPARAM_TEMPLATES_KEY);
    state.subParamTemplates = spt ? JSON.parse(spt.value) : [];
  }catch(e){ state.subParamTemplates = []; }
  try{
    const stt = await window.storage.get(SUBTYPE_TEMPLATES_KEY);
    state.subTypeTemplates = stt ? JSON.parse(stt.value) : [];
  }catch(e){ state.subTypeTemplates = []; }
  try{
    const cs = await window.storage.get(SCRIPTS_KEY);
    state.customScripts = cs ? JSON.parse(cs.value) : [];
  }catch(e){ state.customScripts = []; }
  let paramTitlesBackfilled = false, subParamTitlesBackfilled = false, pieceExIdsBackfilled = false, subTypeTitlesBackfilled = false, exTitlesBackfilled = false;
  state.templates.forEach(t=>{ if(t.title === undefined){ t.title = t.name; exTitlesBackfilled = true; } });
  state.paramTemplates.forEach(t=>{
    if(t.title === undefined){ t.title = t.name; paramTitlesBackfilled = true; }
    (t.steps||[]).forEach(st=>{ if(!st.id){ st.id = uid(); paramTitlesBackfilled = true; } });
  });
  state.subParamTemplates.forEach(t=>{
    if(t.title === undefined){ t.title = t.name; subParamTitlesBackfilled = true; }
    (t.steps||[]).forEach(st=>{ if(!st.id){ st.id = uid(); subParamTitlesBackfilled = true; } });
  });
  state.subTypeTemplates.forEach(t=>{
    if(t.title === undefined){ t.title = t.name; subTypeTitlesBackfilled = true; }
    (t.steps||[]).forEach(st=>{ if(!st.id){ st.id = uid(); subTypeTitlesBackfilled = true; } });
  });
  state.pieceTemplates.forEach(t=>{
    if(t.title === undefined){ t.title = t.name; pieceExIdsBackfilled = true; }
    (t.exercises||[]).forEach(e=>{ if(!e.id){ e.id = uid(); pieceExIdsBackfilled = true; } });
  });
  if(exTitlesBackfilled) saveTemplates();
  if(paramTitlesBackfilled) saveParamTemplates();
  if(subParamTitlesBackfilled) saveSubParamTemplates();
  if(subTypeTitlesBackfilled) saveSubTypeTemplates();
  if(pieceExIdsBackfilled) savePieceTemplates();
  save();
  render();
}
function flagSaveError(context){
  state.saveError = context;
  render();
}
function clearSaveError(){
  if(state.saveError){ state.saveError = null; render(); }
}
function applyPendingImport(){
  const parsed = state.pendingImport;
  if(!parsed) return;
  state.students = parsed.students || [];
  state.templates = parsed.templates || [];
  state.pieceTemplates = parsed.pieceTemplates || [];
  state.paramTemplates = parsed.paramTemplates || [];
  state.subParamTemplates = parsed.subParamTemplates || [];
  state.subTypeTemplates = parsed.subTypeTemplates || [];
  state.customScripts = parsed.customScripts || [];
  state.selected = state.students.length ? state.students[0].id : null;
  state.pendingImport = null;
  Promise.all([save(), saveTemplates(), savePieceTemplates(), saveParamTemplates(), saveSubParamTemplates(), saveSubTypeTemplates(), saveCustomScripts()]).then(render);
  render();
}
function cancelPendingImport(){
  state.pendingImport = null;
  render();
}
async function save(){
  try{ await window.storage.set(KEY_V3, JSON.stringify(state.students)); clearSaveError(); }

function getStudent(id){ return state.students.find(s=>s.id===id); }

function collapseAllTemplateCards(){
  state.collapsedTemplateCards.add('piece');
  state.collapsedTemplateCards.add('exercise');
  const sourceKeys = new Set();
  state.paramTemplates.forEach(t=> sourceKeys.add(t.sourceExercise || 'Other'));
  state.subParamTemplates.forEach(t=> sourceKeys.add(t.sourceExercise || 'Other'));
  state.subTypeTemplates.forEach(t=> sourceKeys.add(t.sourceExercise || 'Other'));
  sourceKeys.forEach(k=> state.collapsedTemplateCards.add('ex-src:' + k));
}

function applyDefaultCollapseForStudent(studentId){
  const s = getStudent(studentId);
  if(!s) return;

  (s.pieces||[]).forEach(p=>{
    const pieceActive = p.exercises.some(ex=>ex.steps.some(st=>st.thisWeek));
    if(pieceActive) state.collapsedPieces.delete(p.id); else state.collapsedPieces.add(p.id);
    p.exercises.forEach(ex=>{
      const exActive = pieceActive && ex.steps.some(st=>st.thisWeek);
      if(exActive) state.collapsedExercises.delete(ex.id); else state.collapsedExercises.add(ex.id);
      (ex.groups||[]).forEach(g=>{
        if(exActive) state.collapsedGroups.delete(g.id); else state.collapsedGroups.add(g.id);
        (g.subgroups||[]).forEach(sg=>{
          state.collapsedSubgroups.add(sg.id);
          (sg.subsubgroups||[]).forEach(ssg=> state.collapsedSubSubgroups.add(ssg.id));
        });
      });
    });
  });
}
function getPiece(studentId, pieceId){ return getStudent(studentId).pieces.find(p=>p.id===pieceId); }
function getExercise(studentId, pieceId, exerciseId){ return getPiece(studentId, pieceId).exercises.find(e=>e.id===exerciseId); }
function cloneExerciseStructure(src){
  const groupIdMap = {}, subGroupIdMap = {}, subSubGroupIdMap = {};
  const newGroups = (src.groups||[]).map(g=>{
    const newGid = uid();
    groupIdMap[g.id] = newGid;
    const newSubgroups = (g.subgroups||[]).map(sg=>{
      const newSgid = uid();
      subGroupIdMap[sg.id] = newSgid;
      const newSubsubgroups = (sg.subsubgroups||[]).map(ssg=>{
        const newSsgid = uid();
        subSubGroupIdMap[ssg.id] = newSsgid;
        return { id: newSsgid, name: ssg.name };
      });
      return { id: newSgid, name: sg.name, subsubgroups: newSubsubgroups };
    });
    return { id: newGid, name: g.name, subgroups: newSubgroups };
  });
  const newSteps = (src.steps||[]).map(st=>({
    id: uid(),
    label: st.label,
    status: 'not_started',
    thisWeek: false,
    groupId: st.groupId ? (groupIdMap[st.groupId]||null) : null,
    subGroupId: st.subGroupId ? (subGroupIdMap[st.subGroupId]||null) : null,
    subSubGroupId: st.subSubGroupId ? (subSubGroupIdMap[st.subSubGroupId]||null) : null
  }));
  return { groups: newGroups, steps: newSteps };
}
function saveExerciseAsTemplate(studentId, pieceId, exerciseId, name){
  if(!name || !name.trim()) return;
  const ex = getExercise(studentId, pieceId, exerciseId);
  const p = getPiece(studentId, pieceId);
  if(!ex) return;
  const cloned = cloneExerciseStructure(ex);
  state.templates.push({ id: uid(), name: ex.name, title: name.trim(), groups: cloned.groups, steps: cloned.steps, sourcePiece: p ? p.name : null });
  saveTemplates(); render();
}
function copyPieceToStudent(sourceStudentId, sourcePieceId, targetStudentId){
  const srcPiece = getPiece(sourceStudentId, sourcePieceId);
  const targetStudent = getStudent(targetStudentId);
  if(!srcPiece || !targetStudent) return;
  const newExercises = srcPiece.exercises.map(ex=>{
    const cloned = cloneExerciseStructure(ex);
    return { id: uid(), name: ex.name, groups: cloned.groups, steps: cloned.steps };
  });
  targetStudent.pieces.push({ id: uid(), name: srcPiece.name, exercises: newExercises });
  save(); render();
}

function insertTemplate(studentId, pieceId, templateId){
  const tpl = state.templates.find(t=>t.id===templateId);
  const p = getPiece(studentId, pieceId);
  if(!tpl || !p) return;
  const cloned = cloneExerciseStructure(tpl);
  p.exercises.push({ id: uid(), name: tpl.name, groups: cloned.groups, steps: cloned.steps });
  state.collapsedPieces.delete(pieceId);
  save(); render();
}
function removeTemplate(templateId){
  state.templates = state.templates.filter(t=>t.id!==templateId);
  saveTemplates(); render();
}

function savePieceAsTemplate(studentId, pieceId, name){
  if(!name || !name.trim()) return;
  const p = getPiece(studentId, pieceId);
  if(!p) return;
  const exercises = p.exercises.map(ex=>({ id: uid(), name: ex.name }));
  state.pieceTemplates.push({ id: uid(), name: p.name, title: name.trim(), exercises });
  savePieceTemplates(); render();
}
function insertPieceTemplate(studentId, templateId, newPieceName){
  const tpl = state.pieceTemplates.find(t=>t.id===templateId);
  const s = getStudent(studentId);
  if(!tpl || !s) return;
  const newExercises = tpl.exercises.map(ex=>({ id: uid(), name: ex.name, groups: [], steps: [] }));
  s.pieces.push({ id: uid(), name: (newPieceName && newPieceName.trim()) || tpl.name, exercises: newExercises });
  save(); render();
}
function removePieceTemplate(templateId){
  state.pieceTemplates = state.pieceTemplates.filter(t=>t.id!==templateId);
  savePieceTemplates(); render();
}

function cloneParamStructure(source){
  const subGroupIdMap = {}, subSubGroupIdMap = {};
  const newSubgroups = (source.subgroups||[]).map(sg=>{
    const newSgid = uid();
    subGroupIdMap[sg.id] = newSgid;
    const newSubsubgroups = (sg.subsubgroups||[]).map(ssg=>{
      const newSsgid = uid();
      subSubGroupIdMap[ssg.id] = newSsgid;
      return { id: newSsgid, name: ssg.name };
    });
    return { id: newSgid, name: sg.name, subsubgroups: newSubsubgroups };
  });
  const newSteps = (source.steps||[]).map(st=>({
    id: uid(),
    label: st.label,
    subGroupId: st.subGroupId ? (subGroupIdMap[st.subGroupId]||null) : null,
    subSubGroupId: st.subSubGroupId ? (subSubGroupIdMap[st.subSubGroupId]||null) : null
  }));
  return { subgroups: newSubgroups, steps: newSteps };
}
function saveParameterAsTemplate(studentId, pieceId, exerciseId, groupId, name){
  if(!name || !name.trim()) return;
  const ex = getExercise(studentId, pieceId, exerciseId);
  const p = getPiece(studentId, pieceId);
  const g = ex && (ex.groups||[]).find(x=>x.id===groupId);
  if(!g) return;
  const relevantSteps = ex.steps.filter(st=>st.groupId===groupId).map(st=>({ label: st.label, subGroupId: st.subGroupId, subSubGroupId: st.subSubGroupId }));
  const cloned = cloneParamStructure({ subgroups: g.subgroups, steps: relevantSteps });
  state.paramTemplates.push({ id: uid(), name: g.name, title: name.trim(), subgroups: cloned.subgroups, steps: cloned.steps, sourcePiece: p ? p.name : null, sourceExercise: ex.name });
  saveParamTemplates(); render();
}
function insertParamTemplate(studentId, pieceId, exerciseId, templateId){
  const tpl = state.paramTemplates.find(t=>t.id===templateId);
  const ex = getExercise(studentId, pieceId, exerciseId);
  if(!tpl || !ex) return;
  const cloned = cloneParamStructure(tpl);
  const newGroupId = uid();
  if(!ex.groups) ex.groups = [];
  ex.groups.push({ id: newGroupId, name: tpl.name, subgroups: cloned.subgroups });
  cloned.steps.forEach(st=>{
    ex.steps.push({ id: uid(), label: st.label, status: 'not_started', thisWeek: false, groupId: newGroupId, subGroupId: st.subGroupId || null, subSubGroupId: st.subSubGroupId || null });
  });
  state.collapsedPieces.delete(pieceId);
  state.collapsedExercises.delete(exerciseId);
  save(); render();
}
function removeParamTemplate(templateId){
  state.paramTemplates = state.paramTemplates.filter(t=>t.id!==templateId);
  saveParamTemplates(); render();
}

function cloneSubParamStructure(source){
  const subSubGroupIdMap = {};
  const newSubsubgroups = (source.subsubgroups||[]).map(ssg=>{
    const newSsgid = uid();
    subSubGroupIdMap[ssg.id] = newSsgid;
    return { id: newSsgid, name: ssg.name };
  });
  const newSteps = (source.steps||[]).map(st=>({
    id: uid(),
    label: st.label,
    subSubGroupId: st.subSubGroupId ? (subSubGroupIdMap[st.subSubGroupId]||null) : null
  }));
  return { subsubgroups: newSubsubgroups, steps: newSteps };
}
function saveSubgroupAsTemplate(studentId, pieceId, exerciseId, groupId, subGroupId, name){
  if(!name || !name.trim()) return;
  const ex = getExercise(studentId, pieceId, exerciseId);
  const p = getPiece(studentId, pieceId);
  const g = ex && (ex.groups||[]).find(x=>x.id===groupId);
  const sg = g && (g.subgroups||[]).find(x=>x.id===subGroupId);
  if(!sg) return;
  const relevantSteps = ex.steps.filter(st=>st.groupId===groupId && st.subGroupId===subGroupId).map(st=>({ label: st.label, subSubGroupId: st.subSubGroupId }));
  const cloned = cloneSubParamStructure({ subsubgroups: sg.subsubgroups, steps: relevantSteps });
  state.subParamTemplates.push({ id: uid(), name: sg.name, title: name.trim(), subsubgroups: cloned.subsubgroups, steps: cloned.steps, sourcePiece: p ? p.name : null, sourceExercise: ex.name });
  saveSubParamTemplates(); render();
}
function insertSubParamTemplate(studentId, pieceId, exerciseId, groupId, templateId){
  const tpl = state.subParamTemplates.find(t=>t.id===templateId);
  const ex = getExercise(studentId, pieceId, exerciseId);
  const g = ex && (ex.groups||[]).find(x=>x.id===groupId);
  if(!tpl || !g) return;
  const cloned = cloneSubParamStructure(tpl);
  const newSubGroupId = uid();
  if(!g.subgroups) g.subgroups = [];
  g.subgroups.push({ id: newSubGroupId, name: tpl.name, subsubgroups: cloned.subsubgroups });
  cloned.steps.forEach(st=>{
    ex.steps.push({ id: uid(), label: st.label, status: 'not_started', thisWeek: false, groupId: groupId, subGroupId: newSubGroupId, subSubGroupId: st.subSubGroupId || null });

function saveSubSubgroupAsTemplate(studentId, pieceId, exerciseId, groupId, subGroupId, subSubGroupId, name){
  if(!name || !name.trim()) return;
  const ex = getExercise(studentId, pieceId, exerciseId);
  const p = getPiece(studentId, pieceId);
  const g = ex && (ex.groups||[]).find(x=>x.id===groupId);
  const sg = g && (g.subgroups||[]).find(x=>x.id===subGroupId);
  const ssg = sg && (sg.subsubgroups||[]).find(x=>x.id===subSubGroupId);
  if(!ssg) return;
  const relevantSteps = ex.steps.filter(st=>st.groupId===groupId && st.subGroupId===subGroupId && st.subSubGroupId===subSubGroupId);
  const steps = relevantSteps.map(st=>({ id: uid(), label: st.label }));
  state.subTypeTemplates.push({ id: uid(), name: ssg.name, title: name.trim(), steps, sourcePiece: p ? p.name : null, sourceExercise: ex.name });
  saveSubTypeTemplates(); render();
}
function insertSubTypeTemplate(studentId, pieceId, exerciseId, groupId, subGroupId, templateId){
  const tpl = state.subTypeTemplates.find(t=>t.id===templateId);
  const ex = getExercise(studentId, pieceId, exerciseId);
  const g = ex && (ex.groups||[]).find(x=>x.id===groupId);
  const sg = g && (g.subgroups||[]).find(x=>x.id===subGroupId);
  if(!tpl || !sg) return;
  const newSubSubGroupId = uid();
  if(!sg.subsubgroups) sg.subsubgroups = [];
  sg.subsubgroups.push({ id: newSubSubGroupId, name: tpl.name });
  (tpl.steps||[]).forEach(st=>{
    ex.steps.push({ id: uid(), label: st.label, status: 'not_started', thisWeek: false, groupId: groupId, subGroupId: subGroupId, subSubGroupId: newSubSubGroupId });
  });
  state.collapsedPieces.delete(pieceId);
  state.collapsedExercises.delete(exerciseId);
  state.collapsedGroups.delete(groupId);
  state.collapsedSubgroups.delete(subGroupId);
  save(); render();
}
function removeSubTypeTemplate(templateId){
  state.subTypeTemplates = state.subTypeTemplates.filter(t=>t.id!==templateId);
  saveSubTypeTemplates(); render();
}

// ---- Template internal editing (Edit Template mode) ----
function tplCollection(type){
  if(type==='exercise') return state.templates;
  if(type==='param') return state.paramTemplates;
  if(type==='subparam') return state.subParamTemplates;
  if(type==='subtype') return state.subTypeTemplates;
}
function tplSave(type){
  if(type==='exercise') saveTemplates();
  else if(type==='param') saveParamTemplates();
  else if(type==='subparam') saveSubParamTemplates();
  else if(type==='subtype') saveSubTypeTemplates();
}
function findTpl(type, tid){ return (tplCollection(type)||[]).find(t=>t.id===tid); }

// Exercise templates (t.groups, t.steps) — full 3-level structure
function addExTplParam(tid, name){
  if(!name || !name.trim()) return;
  const t = findTpl('exercise', tid); if(!t) return;
  if(!t.groups) t.groups = [];
  t.groups.push({ id: uid(), name: name.trim(), subgroups: [] });
  tplSave('exercise'); render();
}
function removeExTplParam(tid, groupId){
  const t = findTpl('exercise', tid); if(!t) return;
  t.groups = (t.groups||[]).filter(g=>g.id!==groupId);
  t.steps = (t.steps||[]).filter(st=>st.groupId!==groupId);
  tplSave('exercise'); render();
}
function addExTplSubparam(tid, groupId, name){
  if(!name || !name.trim()) return;
  const t = findTpl('exercise', tid); const g = t && (t.groups||[]).find(x=>x.id===groupId); if(!g) return;
  if(!g.subgroups) g.subgroups = [];
  g.subgroups.push({ id: uid(), name: name.trim(), subsubgroups: [] });
  tplSave('exercise'); render();
}
function removeExTplSubparam(tid, groupId, subGroupId){
  const t = findTpl('exercise', tid); const g = t && (t.groups||[]).find(x=>x.id===groupId); if(!g) return;
  g.subgroups = (g.subgroups||[]).filter(sg=>sg.id!==subGroupId);
  t.steps = (t.steps||[]).filter(st=>!(st.groupId===groupId && st.subGroupId===subGroupId));
  tplSave('exercise'); render();
}
function addExTplSubtype(tid, groupId, subGroupId, name){
  if(!name || !name.trim()) return;
  const t = findTpl('exercise', tid); const g = t && (t.groups||[]).find(x=>x.id===groupId); const sg = g && (g.subgroups||[]).find(x=>x.id===subGroupId); if(!sg) return;
  if(!sg.subsubgroups) sg.subsubgroups = [];
  sg.subsubgroups.push({ id: uid(), name: name.trim() });
  tplSave('exercise'); render();
}
function removeExTplSubtype(tid, groupId, subGroupId, subSubGroupId){
  const t = findTpl('exercise', tid); const g = t && (t.groups||[]).find(x=>x.id===groupId); const sg = g && (g.subgroups||[]).find(x=>x.id===subGroupId); if(!sg) return;
  sg.subsubgroups = (sg.subsubgroups||[]).filter(ssg=>ssg.id!==subSubGroupId);
  t.steps = (t.steps||[]).filter(st=>!(st.groupId===groupId && st.subGroupId===subGroupId && st.subSubGroupId===subSubGroupId));
  tplSave('exercise'); render();
}
function addExTplStep(tid, groupId, subGroupId, subSubGroupId, label){
  if(!label || !label.trim()) return;
  const t = findTpl('exercise', tid); if(!t) return;
  if(!t.steps) t.steps = [];
  t.steps.push({ id: uid(), label: label.trim(), groupId: groupId||null, subGroupId: subGroupId||null, subSubGroupId: subSubGroupId||null });

function removeExTplStep(tid, stepId){
  const t = findTpl('exercise', tid); if(!t) return;

function findExerciseById(exerciseId){
  for(const s of state.students){
    for(const p of (s.pieces||[])){
      for(const ex of p.exercises){
        if(ex.id===exerciseId) return ex;
      }
    }
  }
  return null;
}

function populateStepSubgroupSelect(exId){
  const ex = findExerciseById(exId);
  const groupSel = document.getElementById('stepgroup-'+exId);
  const subSel = document.getElementById('stepsubgroup-'+exId);
  if(!ex || !groupSel || !subSel) return;
  const g = (ex.groups||[]).find(x=>x.id===groupSel.value);
  const subgroups = (g && g.subgroups) || [];
  subSel.innerHTML = '<option value="">No subparameter</option>' + subgroups.map(sg=>`<option value="${sg.id}">${escapeHTML(sg.name)}</option>`).join('');
  subSel.disabled = subgroups.length===0;
  populateStepSubSubgroupSelect(exId);
}

function populateStepSubSubgroupSelect(exId){
  const ex = findExerciseById(exId);
  const groupSel = document.getElementById('stepgroup-'+exId);
  const subSel = document.getElementById('stepsubgroup-'+exId);
  const subSubSel = document.getElementById('stepsubsubgroup-'+exId);
  if(!ex || !groupSel || !subSel || !subSubSel) return;
  const g = (ex.groups||[]).find(x=>x.id===groupSel.value);
  const sg = g && (g.subgroups||[]).find(x=>x.id===subSel.value);
  const subsubgroups = (sg && sg.subsubgroups) || [];
  subSubSel.innerHTML = '<option value="">No sub-type</option>' + subsubgroups.map(ssg=>`<option value="${ssg.id}">${escapeHTML(ssg.name)}</option>`).join('');
  subSubSel.disabled = subsubgroups.length===0;
}

/* ---------- Actions ---------- */

function addStudent(name){
  if(!name.trim()) return;
  const s = { id: uid(), name: name.trim(), pieces: [] };
  state.students.push(s);
  state.selected = s.id;
  save(); render();
}
function removeStudent(id){
  state.students = state.students.filter(s=>s.id!==id);

}
function bucketKey(st){ return (st.groupId||'none') + '::' + (st.subGroupId||'none') + '::' + (st.subSubGroupId||'none'); }

function moveInArray(arr, id, dir){
  const idx = arr.findIndex(x=>x.id===id);
  const j = dir==='up' ? idx-1 : idx+1;
  if(idx<0 || j<0 || j>=arr.length) return false;
  [arr[idx], arr[j]] = [arr[j], arr[idx]];
  return true;
}
function movePiece(studentId, pieceId, dir){
  const s = getStudent(studentId);
  if(moveInArray(s.pieces, pieceId, dir)){ save(); render(); }
}
function moveExercise(studentId, pieceId, exerciseId, dir){
  const p = getPiece(studentId, pieceId);
  if(moveInArray(p.exercises, exerciseId, dir)){ save(); render(); }
}
function moveGroupOrder(studentId, pieceId, exerciseId, groupId, dir){
  const ex = getExercise(studentId, pieceId, exerciseId);
  if(moveInArray(ex.groups, groupId, dir)){ save(); render(); }
}
function moveSubgroupOrder(studentId, pieceId, exerciseId, groupId, subGroupId, dir){
  const ex = getExercise(studentId, pieceId, exerciseId);
  const g = (ex.groups||[]).find(x=>x.id===groupId);
  if(g && moveInArray(g.subgroups, subGroupId, dir)){ save(); render(); }
}
function moveSubSubgroupOrder(studentId, pieceId, exerciseId, groupId, subGroupId, subSubGroupId, dir){
  const ex = getExercise(studentId, pieceId, exerciseId);
  const g = (ex.groups||[]).find(x=>x.id===groupId);
  const sg = g && (g.subgroups||[]).find(x=>x.id===subGroupId);
  if(sg && moveInArray(sg.subsubgroups, subSubGroupId, dir)){ save(); render(); }
}
function moveStep(studentId, pieceId, exerciseId, stepId, dir){
  const ex = getExercise(studentId, pieceId, exerciseId);
  const target = ex.steps.find(st=>st.id===stepId);
  const key = bucketKey(target);
  const bucket = ex.steps.filter(st=>bucketKey(st)===key);
  const idx = bucket.findIndex(st=>st.id===stepId);
  const neighborIdx = dir==='up' ? idx-1 : idx+1;
  if(neighborIdx<0 || neighborIdx>=bucket.length) return;
  const neighborId = bucket[neighborIdx].id;
  const i = ex.steps.findIndex(st=>st.id===stepId);
  const j = ex.steps.findIndex(st=>st.id===neighborId);
  [ex.steps[i], ex.steps[j]] = [ex.steps[j], ex.steps[i]];
  save(); render();
}

function toggleThisWeek(studentId, pieceId, exerciseId, stepId){
  const ex = getExercise(studentId, pieceId, exerciseId);
  const st = ex.steps.find(x=>x.id===stepId);
  if(st.status==='locked_in') return;
  st.thisWeek = !st.thisWeek;
  if(st.thisWeek){
    state.collapsedPieces.delete(pieceId);
    state.collapsedExercises.delete(exerciseId);
    if(st.groupId) state.collapsedGroups.delete(st.groupId);
    if(st.subGroupId) state.collapsedSubgroups.delete(st.subGroupId);
    if(st.subSubGroupId) state.collapsedSubSubgroups.delete(st.subSubGroupId);
  }
  save(); render();
}

function buildMessage(studentId){
  const s = getStudent(studentId);
  if(!s) return '';
  const STATUS_TAG = { needs_review: '🔁 Review', in_process: '🌱 Waiting for submission', refining: '🔶 Almost there', not_started: '⏸ Standby' };
  const STATUS_PRIORITY = { in_process: 0, refining: 1, needs_review: 2, not_started: 3 };
  const exGroups = [];
  let any = false;
  (s.pieces||[]).forEach(p=>{
    p.exercises.forEach(ex=>{
      const flagged = ex.steps.filter(st=>st.thisWeek);
      if(flagged.length===0) return;
      const loc = `${p.name}: ${ex.name}`;
      const eg = { loc, params: [] };

      const toItem = st=>({ label: st.label, status: st.status });

      const ungroupedItems = flagged.filter(st=>!st.groupId).map(toItem);
      if(ungroupedItems.length) eg.params.push({ name: null, items: ungroupedItems, subparams: [] });

      (ex.groups||[]).forEach(g=>{
        const directItems = flagged.filter(st=>st.groupId===g.id && !st.subGroupId).map(toItem);
        const subparams = [];
        (g.subgroups||[]).forEach(sg=>{
          const subDirectItems = flagged.filter(st=>st.groupId===g.id && st.subGroupId===sg.id && !st.subSubGroupId).map(toItem);
          const subtypes = [];
          (sg.subsubgroups||[]).forEach(ssg=>{
            const typeItems = flagged.filter(st=>st.groupId===g.id && st.subGroupId===sg.id && st.subSubGroupId===ssg.id).map(toItem);
            if(typeItems.length) subtypes.push({ name: ssg.name, items: typeItems });
          });
          if(subDirectItems.length || subtypes.length) subparams.push({ name: sg.name, items: subDirectItems, subtypes });
        });
        if(directItems.length || subparams.length) eg.params.push({ name: g.name, items: directItems, subparams });
      });

      const itemsMinPriority = (items)=>{
        let min = 99;
        items.forEach(it=>{ min = Math.min(min, STATUS_PRIORITY[it.status]); });
        return min;
      };
      const subtypeMinPriority = (te)=> itemsMinPriority(te.items);
      const subparamMinPriority = (se)=>{
        let min = itemsMinPriority(se.items);
        se.subtypes.forEach(te=>{ min = Math.min(min, subtypeMinPriority(te)); });
        return min;
      };
      const minPriority = (pe)=>{
        let min = itemsMinPriority(pe.items);
        pe.subparams.forEach(se=>{ min = Math.min(min, subparamMinPriority(se)); });
        return min;
      };
      eg.params.forEach(pe=>{
        pe.subparams.forEach(se=> se.subtypes.sort((a,b)=> subtypeMinPriority(a) - subtypeMinPriority(b)));
        pe.subparams.sort((a,b)=> subparamMinPriority(a) - subparamMinPriority(b));
      });
      eg.params.sort((a,b)=> minPriority(a) - minPriority(b));

      if(eg.params.length){ any = true; exGroups.push(eg); }
    });
  });
  if(!any){
    return `Nothing flagged "This Week" yet for ${s.name}. Toggle on the steps you want to assign, below.`;
  }

  const printItems = (items, indent)=>{
    const sorted = [...items].sort((a,b)=> STATUS_PRIORITY[a.status] - STATUS_PRIORITY[b.status]);
    return sorted.map(it=> `${indent}${STATUS_TAG[it.status]}: ${it.label}\n`).join('');
  };

  let msg = `Here's the plan until our next check-in:\n\n`;
  exGroups.forEach(eg=>{
    msg += `🎵 ${eg.loc}\n`;
    eg.params.forEach(pe=>{
      const i1 = pe.name ? '   ' : '';
      if(pe.name) msg += `${i1}${pe.name}\n`;
      const i2 = pe.name ? '      ' : '   ';
      msg += printItems(pe.items, i2);
      pe.subparams.forEach(se=>{
        msg += `${i2}${se.name}\n`;
        const i3 = i2 + '   ';
        msg += printItems(se.items, i3);
        se.subtypes.forEach(te=>{
          msg += `${i3}${te.name}\n`;
          const i4 = i3 + '   ';
          msg += printItems(te.items, i4);
        });
      });
    });
    msg += `\n`;
  });
  msg += `Key:\n`;
  msg += `🌱 Waiting for submission: this week's new focus. Send it whenever it's ready.\n`;
  msg += `⏸ Standby: hold off until I give the green light.\n`;
  msg += `🔶 Almost there: got your video, just needs one or two more passes before it's locked in.\n`;
  msg += `🔁 Review: already learned, keep it solid. Send these first.\n`;
  msg += `✅ Locked In: nothing to send here, this one's holding steady, until further notice.\n\n`;
  msg += `Send the review clips first, then anything new.\n`;
  msg += `📌 Label each clip (e.g. "Review: Root Inversion") or just say the exercise name at the start of the video. Either works, I just need to know what I'm looking at.\n`;
  msg += `📌 I review videos Monday through Friday. Any submission sent Friday through the weekend gets reviewed the following Monday.`;
  return msg;
}

🌱 Waiting for submission: it's new, I haven't gotten a video yet. Whenever it's ready, send it.

⏸ Standby: coming up, but don't touch it yet. I'll tell you when.

🔶 Almost there: got your video, you're close, just needs another pass.

🔁 Review: you've already got this one down, we're just keeping it sharp. Still means send a video.

function escapeHTML(str){ const d=document.createElement('div'); d.innerText=str; return d.innerHTML; }
function escapeAttr(str){ return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function startEdit(el, value){
  el.style.overflow = 'visible';
  el.style.textOverflow = 'clip';
  el.style.whiteSpace = 'normal';
  el.style.flex = '1';
  el.style.minWidth = '220px';
  el.innerHTML = `<input class="inline-edit" style="min-width:220px;width:100%;box-sizing:border-box;" value="${escapeAttr(value)}">`;
  const input = el.querySelector('input');
  input.focus();
  input.select();
  let done = false;
  const commit = ()=>{
    if(done) return; done = true;
    applyRename(el.dataset.edit, input.value);
  };
  const cancel = ()=>{
    if(done) return; done = true;
    render();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){ e.preventDefault(); input.blur(); }
    if(e.key==='Escape'){ e.preventDefault(); cancel(); }
  });
}

function applyRename(editKey, newVal){
  const v = newVal.trim();
  if(!v){ render(); return; }
  const [type, ...ids] = editKey.split('|');
  if(type==='student'){
    const [sid] = ids;
    getStudent(sid).name = v;
  } else if(type==='piece'){
    const [sid,pid] = ids;
    getPiece(sid,pid).name = v;
  } else if(type==='exercise'){
    const [sid,pid,eid] = ids;
    getExercise(sid,pid,eid).name = v;
  } else if(type==='group'){
    const [sid,pid,eid,gid] = ids;
    const ex = getExercise(sid,pid,eid);
    const g = (ex.groups||[]).find(x=>x.id===gid);
    if(g) g.name = v;
  } else if(type==='subgroup'){
    const [sid,pid,eid,gid,sgid] = ids;
    const ex = getExercise(sid,pid,eid);
    const g = (ex.groups||[]).find(x=>x.id===gid);
    const sg = g && (g.subgroups||[]).find(x=>x.id===sgid);
    if(sg) sg.name = v;
  } else if(type==='subsubgroup'){
    const [sid,pid,eid,gid,sgid,ssgid] = ids;

    const g = (ex.groups||[]).find(x=>x.id===gid);
    const sg = g && (g.subgroups||[]).find(x=>x.id===sgid);
    const ssg = sg && (sg.subsubgroups||[]).find(x=>x.id===ssgid);
    if(ssg) ssg.name = v;
  } else if(type==='step'){
    const [sid,pid,eid,stid] = ids;
    const ex = getExercise(sid,pid,eid);
    const st = ex.steps.find(x=>x.id===stid);
    if(st) st.label = v;
  } else if(type==='exerciseTemplate'){
    const [tid] = ids;
    const t = state.templates.find(x=>x.id===tid);
    if(t) t.name = v;
    saveTemplates(); render();
    return;
  } else if(type==='exerciseTemplateTitle'){
    const [tid] = ids;

/* ---------- Render ---------- */

function tplTreeRow(tag, tagLabel, name, editKey){
  const nameHtml = editKey
    ? `<span class="tpltree-name editable" data-edit="${editKey}" title="Double-click to edit">${escapeHTML(name)}</span>`
    : `<span class="tpltree-name">${escapeHTML(name)}</span>`;
  return `<div class="tpltree-row"><span class="tpltree-tag ${tag}">${tagLabel}</span>${nameHtml}</div>`;
}
function tplStepRows(steps, editPrefix){
  return steps.map(st=> tplTreeRow('step','Step', st.label, editPrefix ? `${editPrefix}|${st.id}` : null)).join('');
}

function renderExerciseTemplateTree(t){
  let html = tplStepRows((t.steps||[]).filter(st=>!st.groupId), `tplExStep|${t.id}`);
  (t.groups||[]).forEach(g=>{
    let inner = tplStepRows((t.steps||[]).filter(st=>st.groupId===g.id && !st.subGroupId), `tplExStep|${t.id}`);
    (g.subgroups||[]).forEach(sg=>{
      let subInner = tplStepRows((t.steps||[]).filter(st=>st.groupId===g.id && st.subGroupId===sg.id && !st.subSubGroupId), `tplExStep|${t.id}`);
      (sg.subsubgroups||[]).forEach(ssg=>{
        const typeInner = tplStepRows((t.steps||[]).filter(st=>st.groupId===g.id && st.subGroupId===sg.id && st.subSubGroupId===ssg.id), `tplExStep|${t.id}`);
        subInner += `<div class="subsubgroup-block">${tplTreeRow('subtype','Sub-type', ssg.name, `tplExSubsubgroup|${t.id}|${g.id}|${sg.id}|${ssg.id}`)}${typeInner}</div>`;
      });
      inner += `<div class="subgroup-block">${tplTreeRow('subparam','Sub-parameter', sg.name, `tplExSubgroup|${t.id}|${g.id}|${sg.id}`)}${subInner}</div>`;
    });
    html += `<div class="group-block">${tplTreeRow('param','Parameter', g.name, `tplExGroup|${t.id}|${g.id}`)}${inner}</div>`;
  });
  return `${tplTreeRow('exercise','Exercise', t.name, `exerciseTemplate|${t.id}`)}${html}`;
}

function renderPieceTemplateTree(t){
  const html = (t.exercises||[]).map(e=> tplTreeRow('exercise','Exercise', e.name, `tplPieceExercise|${t.id}|${e.id}`)).join('');
  return `${tplTreeRow('piece','Piece', t.name, `pieceTemplate|${t.id}`)}${html || '<div class="hint">No exercises in this template.</div>'}`;
}
